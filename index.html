<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID BREACH — FPS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--neon:#00ffe7;--red:#ff2d2d;--bg:#050810;--gold:#ffaa00;}
body{background:var(--bg);overflow:hidden;font-family:'Share Tech Mono',monospace;color:var(--neon);cursor:none;}
body.show-cursor,body.show-cursor *{cursor:auto!important;}
body.show-cursor .btn{cursor:pointer!important;}
/* Always show cursor on overlay screens regardless of JS state */
#start-screen,#start-screen *,#death-screen,#death-screen *,
#win-screen,#win-screen *,#pause-screen,#pause-screen *,
#lobby-screen,#lobby-screen *,#staging-screen,#staging-screen *,
#settings-panel,#settings-panel *,#powerup-screen,#powerup-screen *
{cursor:auto!important;}
#start-screen .btn,#death-screen .btn,#win-screen .btn,#pause-screen .btn,
.lobby-btn,.keybind-btn,.tab-btn,.privacy-opt,.pu-banner,.room-entry,.kick-btn,
#create-room-btn,#start-game-btn,#leave-room-btn,#refresh-btn,#chat-send,
#join-code-btn,#join-selected-btn,#gen-code-btn,#lobby-back-btn,
#staging-code-display,#opt-public,#opt-private
{cursor:pointer!important;}
#gameCanvas{display:block;width:100vw;height:100vh;}
#weaponCanvas{position:fixed;inset:0;pointer-events:none;z-index:5;}
#ads-vignette{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 28%,rgba(0,0,0,0.92) 100%);opacity:0;pointer-events:none;z-index:6;}
#stance-indicator{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:3px;color:rgba(0,255,231,0.85);text-shadow:0 0 8px var(--neon);opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:11;}
#hud{position:fixed;inset:0;pointer-events:none;z-index:10;}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:28px;height:28px;}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,0.95);border-radius:2px;}
#crosshair::before{width:2px;height:10px;top:9px;left:13px;}
#crosshair::after{width:10px;height:2px;top:13px;left:9px;}
#crosshair-dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:4px;background:var(--neon);border-radius:50%;box-shadow:0 0 6px var(--neon);}
#health-bar-wrap{position:absolute;bottom:40px;left:40px;}
#health-label{font-size:10px;letter-spacing:3px;color:var(--neon);margin-bottom:6px;text-shadow:0 0 8px var(--neon);}
#health-bar-bg{width:200px;height:8px;background:rgba(0,255,231,0.1);border:1px solid rgba(0,255,231,0.3);border-radius:2px;}
#health-bar{height:100%;width:100%;background:var(--neon);box-shadow:0 0 10px var(--neon);border-radius:2px;transition:width 0.2s,background 0.3s;}
#health-value{margin-top:4px;font-size:22px;font-family:'Orbitron',sans-serif;font-weight:700;color:var(--neon);text-shadow:0 0 12px var(--neon);}
#ammo-display{position:absolute;bottom:40px;right:40px;text-align:right;}
#ammo-label{font-size:10px;letter-spacing:3px;color:rgba(0,255,231,0.6);margin-bottom:2px;}
#ammo-count{font-family:'Orbitron',sans-serif;font-size:36px;font-weight:900;color:white;text-shadow:0 0 16px rgba(255,255,255,0.5);}
#ammo-reserve{font-size:14px;color:rgba(255,255,255,0.4);}
#score-display{position:absolute;top:30px;right:40px;text-align:right;}
#score-label{font-size:10px;letter-spacing:3px;color:rgba(0,255,231,0.5);}
#score-value{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:700;color:var(--neon);text-shadow:0 0 12px var(--neon);}
#kills-display{font-size:12px;color:rgba(255,255,231,0.5);margin-top:2px;}
#room-display{position:absolute;top:30px;left:40px;}
#room-label{font-size:10px;letter-spacing:3px;color:rgba(255,100,100,0.7);}
#room-value{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:700;color:var(--red);text-shadow:0 0 12px var(--red);}
#enemies-left{font-size:11px;color:rgba(255,100,100,0.6);margin-top:2px;}
#hit-flash{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(255,0,0,0.45) 100%);opacity:0;transition:opacity 0.05s;pointer-events:none;}
#kill-flash{position:absolute;inset:0;background:rgba(0,255,180,0.06);opacity:0;pointer-events:none;}
#fire-overlay{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(255,80,0,0.2) 100%);opacity:0;pointer-events:none;}
#reload-text{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);font-size:14px;letter-spacing:4px;color:#fff;opacity:0;text-shadow:0 0 10px white;transition:opacity 0.15s;}
#scanlines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;}
#vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.7) 100%);pointer-events:none;}
#active-powerups{position:absolute;top:90px;left:40px;display:flex;flex-direction:column;gap:5px;}
.pu-active{font-size:10px;letter-spacing:2px;padding:3px 10px;border-left:2px solid;opacity:0.9;}
.pu-active.fire{border-color:#ff6400;color:#ff9944;}
.pu-active.speed{border-color:#aa00ff;color:#cc66ff;}
.pu-active.shield{border-color:#0088ff;color:#44aaff;}

/* Minimap */
#minimap{
  position:fixed;bottom:40px;left:50%;transform:translateX(-50%);
  width:110px;height:110px;
  border:1px solid rgba(0,255,231,0.25);
  background:rgba(5,8,16,0.7);
  border-radius:3px;pointer-events:none;z-index:11;
  backdrop-filter:blur(4px);
}
#minimap canvas{width:100%;height:100%;}
#minimap-label{
  position:absolute;top:-16px;left:50%;transform:translateX(-50%);
  font-size:8px;letter-spacing:3px;color:rgba(0,255,231,0.4);
}

/* Floating damage numbers */
.dmg-num{
  position:fixed;pointer-events:none;z-index:20;
  font-family:'Orbitron',sans-serif;font-weight:900;
  text-shadow:0 0 8px currentColor;
  animation:dmgFloat 0.9s ease-out forwards;
}
@keyframes dmgFloat{
  0%  {opacity:1;transform:translate(-50%,-50%) scale(1);}
  60% {opacity:1;transform:translate(-50%,-120%) scale(1.1);}
  100%{opacity:0;transform:translate(-50%,-200%) scale(0.8);}
}

/* Room clear banner */
#room-clear-banner{
  position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);
  font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:clamp(18px,3vw,36px);letter-spacing:6px;
  color:#00ff88;text-shadow:0 0 24px #00ff88;
  z-index:52;opacity:0;pointer-events:none;
  transition:opacity 0.3s;text-align:center;
}

/* Enemy HP bars rendered by CSS on a canvas overlay — handled in JS */
#enemy-hpbar-canvas{
  position:fixed;inset:0;pointer-events:none;z-index:8;
}
#boss-hpbar-wrap{position:absolute;top:70px;left:50%;transform:translateX(-50%);width:min(480px,65vw);display:none;}
#boss-name{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;color:var(--gold);text-align:center;margin-bottom:5px;text-shadow:0 0 10px var(--gold);}
#boss-hpbar-bg{width:100%;height:10px;background:rgba(255,170,0,0.15);border:1px solid rgba(255,170,0,0.4);border-radius:3px;}
#boss-hpbar{height:100%;width:100%;background:linear-gradient(90deg,#ff4400,#ffaa00);box-shadow:0 0 12px rgba(255,170,0,0.5);border-radius:3px;transition:width 0.15s;}
#damage-indicator{position:fixed;inset:0;pointer-events:none;z-index:9;}
.hit-marker{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;pointer-events:none;}
.hit-marker::before,.hit-marker::after{content:'';position:absolute;background:var(--red);box-shadow:0 0 6px var(--red);}
.hit-marker::before{width:2px;height:8px;top:6px;left:9px;}
.hit-marker::after{width:8px;height:2px;top:9px;left:6px;}
#room-announce{position:fixed;top:42%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',sans-serif;font-size:clamp(22px,4vw,54px);font-weight:900;letter-spacing:6px;color:var(--red);text-shadow:0 0 30px var(--red);z-index:50;opacity:0;pointer-events:none;transition:opacity 0.35s;text-align:center;}
#boss-announce{position:fixed;top:34%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',sans-serif;font-size:clamp(26px,5vw,70px);font-weight:900;letter-spacing:8px;color:var(--gold);text-shadow:0 0 40px var(--gold);z-index:51;opacity:0;pointer-events:none;transition:opacity 0.4s;text-align:center;}
/* Powerup screen */
/* ─── POWER-UP SCREEN ─── */
#powerup-screen{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(3,5,12,0.97);backdrop-filter:blur(12px);
  flex-direction:column;align-items:center;justify-content:center;
}
#powerup-screen.open{display:flex;animation:puFadeIn 0.4s ease;}
@keyframes puFadeIn{from{opacity:0;transform:scale(0.96);}to{opacity:1;transform:scale(1);}}

#pu-header{text-align:center;margin-bottom:44px;}
#pu-room-badge{
  display:inline-block;font-size:10px;letter-spacing:4px;
  color:rgba(255,255,255,0.35);text-transform:uppercase;
  border:1px solid rgba(255,255,255,0.1);padding:4px 14px;border-radius:2px;
  margin-bottom:16px;
}
#powerup-title{
  font-family:'Orbitron',sans-serif;font-size:clamp(20px,3.5vw,40px);
  font-weight:900;letter-spacing:7px;
  background:linear-gradient(90deg,#ffaa00,#ffe066,#ffaa00);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 18px rgba(255,170,0,0.5));
  margin-bottom:6px;
}
#powerup-subtitle{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.32);}
#pu-health-limit{
  margin-top:8px;font-size:10px;letter-spacing:2px;
  color:rgba(255,100,100,0.5);
}

#powerup-banners{display:flex;gap:22px;flex-wrap:wrap;justify-content:center;max-width:900px;}

/* Base banner */
.pu-banner{
  position:relative;width:220px;padding:0;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(10,14,26,0.9);
  cursor:pointer;overflow:hidden;
  transition:transform 0.22s cubic-bezier(.34,1.56,.64,1), box-shadow 0.22s;
  animation:bannerSlideUp 0.5s cubic-bezier(.34,1.56,.64,1) both;
}
.pu-banner:nth-child(1){animation-delay:0.05s;}
.pu-banner:nth-child(2){animation-delay:0.15s;}
.pu-banner:nth-child(3){animation-delay:0.25s;}
@keyframes bannerSlideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

.pu-banner:hover{transform:translateY(-8px) scale(1.03);}
.pu-banner:active{transform:translateY(-4px) scale(0.99);}

/* Top color stripe */
.pu-stripe{height:4px;width:100%;display:block;}

/* Banner inner padding */
.pu-inner{padding:22px 20px 20px;}

/* Rarity label */
.pu-rarity{
  font-size:9px;letter-spacing:3px;text-transform:uppercase;
  margin-bottom:14px;font-family:'Share Tech Mono',monospace;
  opacity:0.7;
}

.pu-icon{font-size:44px;margin-bottom:14px;display:block;line-height:1;
  filter:drop-shadow(0 0 8px currentColor);}

.pu-name{
  font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;
  letter-spacing:2px;margin-bottom:10px;text-transform:uppercase;
}
.pu-desc{
  font-size:10px;letter-spacing:0.5px;
  color:rgba(255,255,255,0.42);line-height:1.7;
}
.pu-stat{
  margin-top:12px;padding:6px 10px;
  background:rgba(255,255,255,0.04);border-left:2px solid;
  font-size:10px;letter-spacing:1px;color:rgba(255,255,255,0.55);
}

/* Shimmer overlay on hover */
.pu-banner::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.06) 0%,transparent 60%);
  opacity:0;transition:opacity 0.22s;pointer-events:none;
}
.pu-banner:hover::after{opacity:1;}

/* ── RARITY TYPES ── */
/* Common — teal */
.pu-banner.common .pu-stripe{background:var(--neon);}
.pu-banner.common{box-shadow:0 0 0 1px rgba(0,255,231,0.08);}
.pu-banner.common:hover{box-shadow:0 14px 40px rgba(0,255,231,0.25),0 0 0 1px rgba(0,255,231,0.3);}
.pu-banner.common .pu-name{color:var(--neon);}
.pu-banner.common .pu-rarity{color:var(--neon);}
.pu-banner.common .pu-stat{border-color:var(--neon);}

/* Uncommon — green */
.pu-banner.uncommon .pu-stripe{background:#00ff88;}
.pu-banner.uncommon{box-shadow:0 0 0 1px rgba(0,255,136,0.08);}
.pu-banner.uncommon:hover{box-shadow:0 14px 40px rgba(0,255,136,0.25),0 0 0 1px rgba(0,255,136,0.3);}
.pu-banner.uncommon .pu-name{color:#00ff88;}
.pu-banner.uncommon .pu-rarity{color:#00ff88;}
.pu-banner.uncommon .pu-stat{border-color:#00ff88;}

/* Rare — orange/fire */
.pu-banner.rare .pu-stripe{background:linear-gradient(90deg,#ff4400,#ff9900);}
.pu-banner.rare{box-shadow:0 0 0 1px rgba(255,100,0,0.1);}
.pu-banner.rare:hover{box-shadow:0 14px 40px rgba(255,100,0,0.3),0 0 0 1px rgba(255,100,0,0.35);}
.pu-banner.rare .pu-name{color:#ff8844;}
.pu-banner.rare .pu-rarity{color:#ff8844;}
.pu-banner.rare .pu-stat{border-color:#ff6400;}

/* Epic — gold */
.pu-banner.epic .pu-stripe{background:linear-gradient(90deg,#cc8800,#ffe066,#cc8800);}
.pu-banner.epic{box-shadow:0 0 0 1px rgba(255,170,0,0.1);}
.pu-banner.epic:hover{box-shadow:0 14px 40px rgba(255,170,0,0.35),0 0 0 1px rgba(255,170,0,0.4);}
.pu-banner.epic .pu-name{color:var(--gold);}
.pu-banner.epic .pu-rarity{color:var(--gold);}
.pu-banner.epic .pu-stat{border-color:var(--gold);}

/* Legendary — purple */
.pu-banner.legendary .pu-stripe{background:linear-gradient(90deg,#6600ff,#cc44ff,#6600ff);}
.pu-banner.legendary{box-shadow:0 0 0 1px rgba(150,0,255,0.1);}
.pu-banner.legendary:hover{box-shadow:0 14px 40px rgba(150,0,255,0.35),0 0 0 1px rgba(150,0,255,0.4);}
.pu-banner.legendary .pu-name{color:#cc44ff;}
.pu-banner.legendary .pu-rarity{color:#cc44ff;}
.pu-banner.legendary .pu-stat{border-color:#8822ff;}

/* Chosen flash */
.pu-banner.chosen{animation:puChosen 0.35s ease forwards;}
@keyframes puChosen{0%{transform:scale(1);}50%{transform:scale(1.08);}100%{transform:scale(0.95);opacity:0;}}
/* Overlays */
.overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(5,8,16,0.93);backdrop-filter:blur(6px);}
.overlay h1{font-family:'Orbitron',sans-serif;font-size:clamp(30px,6vw,70px);font-weight:900;letter-spacing:6px;color:var(--neon);text-shadow:0 0 30px var(--neon),0 0 60px rgba(0,255,231,0.4);margin-bottom:10px;}
.overlay p{font-size:13px;letter-spacing:3px;color:rgba(0,255,231,0.5);margin-bottom:32px;}
.overlay .sub{font-size:11px;color:rgba(255,255,255,0.28);margin-top:16px;letter-spacing:2px;text-align:center;line-height:2.2;}
.btn{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;letter-spacing:4px;padding:12px 34px;border:2px solid var(--neon);background:transparent;color:var(--neon);cursor:pointer;text-transform:uppercase;text-shadow:0 0 10px var(--neon);box-shadow:0 0 14px rgba(0,255,231,0.18),inset 0 0 14px rgba(0,255,231,0.04);transition:all 0.17s;margin:5px 0;min-width:230px;}
.btn:hover{background:rgba(0,255,231,0.09);box-shadow:0 0 32px rgba(0,255,231,0.38),inset 0 0 22px rgba(0,255,231,0.09);transform:scale(1.03);}
.btn-red{border-color:var(--red);color:var(--red);text-shadow:0 0 10px var(--red);box-shadow:0 0 14px rgba(255,45,45,0.18);}
.btn-red:hover{background:rgba(255,45,45,0.09);box-shadow:0 0 32px rgba(255,45,45,0.38);}
.btn-gold{border-color:var(--gold);color:var(--gold);text-shadow:0 0 10px var(--gold);}
#death-screen h1{color:var(--red);text-shadow:0 0 30px var(--red),0 0 60px rgba(255,45,45,0.4);}
.death-stats,.win-stats{margin:16px 0;text-align:center;line-height:2;font-size:14px;color:rgba(255,255,255,0.58);letter-spacing:2px;}
.death-stats span,.win-stats span{color:white;}
.menu-gun{width:min(500px,78vw);margin-bottom:26px;filter:drop-shadow(0 0 16px rgba(0,255,231,0.35)) drop-shadow(0 4px 22px rgba(0,0,0,0.8));animation:gunFloat 3s ease-in-out infinite;}
.death-gun{filter:drop-shadow(0 0 16px rgba(255,45,45,0.4)) drop-shadow(0 4px 22px rgba(0,0,0,0.8));}
@keyframes gunFloat{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-8px) rotate(0.5deg);}}
#pause-screen{display:none;}
#settings-panel{display:none;position:fixed;inset:0;z-index:110;background:rgba(5,8,16,0.97);backdrop-filter:blur(8px);flex-direction:column;align-items:center;justify-content:center;}
#settings-panel.open{display:flex;}
#settings-panel h2{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;letter-spacing:5px;color:var(--neon);text-shadow:0 0 18px var(--neon);margin-bottom:24px;}
.settings-box{background:rgba(0,255,231,0.03);border:1px solid rgba(0,255,231,0.14);border-radius:4px;padding:20px 30px;width:min(510px,88vw);max-height:66vh;overflow-y:auto;}
.settings-tabs{display:flex;gap:7px;margin-bottom:20px;}
.tab-btn{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;padding:7px 14px;border:1px solid rgba(0,255,231,0.28);background:transparent;color:rgba(0,255,231,0.5);cursor:pointer;transition:all 0.14s;text-transform:uppercase;}
.tab-btn.active{border-color:var(--neon);color:var(--neon);background:rgba(0,255,231,0.07);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.setting-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.setting-label{font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.58);text-transform:uppercase;}
.setting-val{font-family:'Orbitron',sans-serif;font-size:12px;color:var(--neon);min-width:42px;text-align:right;}
input[type=range]{-webkit-appearance:none;width:145px;height:3px;background:rgba(0,255,231,0.2);outline:none;border-radius:2px;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--neon);box-shadow:0 0 7px var(--neon);cursor:pointer;}
.keybind-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;}
.keybind-label{font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.58);text-transform:uppercase;}
.keybind-btn{font-family:'Share Tech Mono',monospace;font-size:11px;padding:5px 11px;border:1px solid rgba(0,255,231,0.38);background:rgba(0,0,0,0.38);color:var(--neon);cursor:pointer;min-width:78px;text-align:center;transition:all 0.14s;text-transform:uppercase;}
.keybind-btn.listening{border-color:#ffaa00;color:#ffaa00;animation:kbPulse 0.5s ease infinite alternate;}
@keyframes kbPulse{from{box-shadow:0 0 4px #ffaa00;}to{box-shadow:0 0 13px #ffaa00;}}
.settings-back{margin-top:16px;}

/* ═══════════════════════════════════════
   MULTIPLAYER LOBBY SYSTEM
═══════════════════════════════════════ */
#lobby-screen{display:none;position:fixed;inset:0;z-index:150;background:rgba(3,5,12,0.98);backdrop-filter:blur(10px);flex-direction:column;align-items:center;}
#lobby-screen.open{display:flex;}
#lobby-header{width:100%;padding:22px 36px 16px;border-bottom:1px solid rgba(0,255,231,0.12);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;position:relative;}
#lobby-title{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;letter-spacing:6px;color:var(--neon);text-shadow:0 0 16px var(--neon);}
#lobby-subtitle{font-size:10px;letter-spacing:3px;color:rgba(0,255,231,0.4);margin-top:3px;}
#lobby-player-tag{display:flex;align-items:center;gap:10px;flex-direction:column;align-items:flex-end;}
.player-dot{width:8px;height:8px;border-radius:50%;background:var(--neon);box-shadow:0 0 8px var(--neon);animation:dotPulse 1.5s ease infinite;display:inline-block;}
@keyframes dotPulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
#lobby-player-name-input{background:transparent;border:none;border-bottom:1px solid rgba(0,255,231,0.3);color:var(--neon);font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:2px;outline:none;width:160px;padding:2px 4px;text-align:right;}
#lobby-player-name-input::placeholder{color:rgba(0,255,231,0.3);}
#lobby-body{display:flex;flex:1;width:100%;min-height:0;}
#lobby-left{width:55%;display:flex;flex-direction:column;border-right:1px solid rgba(0,255,231,0.1);padding:20px 24px;}
#lobby-right{width:45%;display:flex;flex-direction:column;padding:20px 24px;}
#lobby-left h3,#lobby-right h3{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;color:rgba(0,255,231,0.6);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid rgba(0,255,231,0.08);text-transform:uppercase;}
#room-list-actions{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
#refresh-btn{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;padding:5px 12px;border:1px solid rgba(0,255,231,0.25);background:transparent;color:rgba(0,255,231,0.5);cursor:pointer;transition:all 0.15s;text-transform:uppercase;}
#refresh-btn:hover{border-color:var(--neon);color:var(--neon);}
#room-count{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.3);}
#room-list{flex:1;overflow-y:auto;min-height:0;display:flex;flex-direction:column;gap:6px;padding-right:4px;scrollbar-width:thin;scrollbar-color:rgba(0,255,231,0.2) transparent;}
#room-list::-webkit-scrollbar{width:4px;}
#room-list::-webkit-scrollbar-thumb{background:rgba(0,255,231,0.2);border-radius:2px;}
.room-entry{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:1px solid rgba(0,255,231,0.1);background:rgba(0,255,231,0.02);cursor:pointer;transition:all 0.15s;}
.room-entry:hover{border-color:rgba(0,255,231,0.35);background:rgba(0,255,231,0.06);}
.room-entry.selected{border-color:var(--neon);background:rgba(0,255,231,0.09);}
.room-entry.full{opacity:0.45;cursor:not-allowed;}
.room-entry-left{display:flex;flex-direction:column;gap:3px;}
.room-entry-name{font-size:13px;letter-spacing:1px;color:white;font-weight:600;}
.room-entry-host{font-size:10px;letter-spacing:1px;color:rgba(255,255,255,0.4);}
.room-entry-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.room-entry-players{font-size:11px;letter-spacing:1px;color:rgba(0,255,231,0.7);}
.room-badge{font-size:9px;letter-spacing:2px;padding:2px 7px;border-radius:2px;text-transform:uppercase;font-weight:600;}
.room-badge.pub{background:rgba(0,255,100,0.12);color:#00ff88;border:1px solid rgba(0,255,100,0.25);}
.room-badge.priv{background:rgba(255,170,0,0.12);color:var(--gold);border:1px solid rgba(255,170,0,0.25);}
.room-badge.full-badge{background:rgba(255,45,45,0.12);color:var(--red);border:1px solid rgba(255,45,45,0.25);}
.ping-good{color:#00ff88;font-size:9px;letter-spacing:1px;}.ping-ok{color:#ffaa00;font-size:9px;letter-spacing:1px;}.ping-bad{color:var(--red);font-size:9px;letter-spacing:1px;}
#room-list-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,0.2);font-size:11px;letter-spacing:2px;gap:8px;}
#lobby-join-footer{margin-top:16px;padding-top:14px;border-top:1px solid rgba(0,255,231,0.08);display:flex;flex-direction:column;gap:10px;}
#join-code-row{display:flex;gap:8px;align-items:center;}
.lobby-input{flex:1;background:rgba(0,255,231,0.04);border:1px solid rgba(0,255,231,0.2);color:white;font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:2px;padding:9px 12px;outline:none;transition:border-color 0.15s;text-transform:uppercase;}
.lobby-input:focus{border-color:var(--neon);}
.lobby-input::placeholder{color:rgba(255,255,255,0.2);text-transform:none;letter-spacing:1px;}
.lobby-input.error{border-color:var(--red);animation:inputShake 0.3s ease;}
.lobby-input.success{border-color:#00ff88;}
@keyframes inputShake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
.lobby-btn{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;padding:9px 20px;border:1px solid var(--neon);background:transparent;color:var(--neon);cursor:pointer;text-transform:uppercase;transition:all 0.15s;white-space:nowrap;}
.lobby-btn:hover{background:rgba(0,255,231,0.1);box-shadow:0 0 16px rgba(0,255,231,0.25);}
.lobby-btn:disabled{opacity:0.35;cursor:not-allowed;}
.lobby-btn.red{border-color:var(--red);color:var(--red);}.lobby-btn.red:hover{background:rgba(255,45,45,0.1);}
.lobby-btn.gold{border-color:var(--gold);color:var(--gold);}.lobby-btn.gold:hover{background:rgba(255,170,0,0.1);}
#join-selected-btn{width:100%;}
#join-error{font-size:10px;letter-spacing:1px;color:var(--red);min-height:14px;}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:16px;}
.form-label{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.5);text-transform:uppercase;}
.form-label span{color:rgba(255,255,255,0.25);font-size:9px;margin-left:4px;}
#privacy-toggle-row{display:flex;gap:0;}
.privacy-opt{flex:1;padding:8px;text-align:center;font-size:11px;letter-spacing:2px;border:1px solid rgba(0,255,231,0.2);cursor:pointer;transition:all 0.15s;color:rgba(255,255,255,0.4);text-transform:uppercase;}
.privacy-opt:first-child{border-right:none;}
.privacy-opt.active.pub-active{background:rgba(0,255,100,0.1);border-color:#00ff88;color:#00ff88;}
.privacy-opt.active.priv-active{background:rgba(255,170,0,0.1);border-color:var(--gold);color:var(--gold);}
#player-limit-row{display:flex;align-items:center;gap:12px;}
#player-limit-slider{flex:1;-webkit-appearance:none;height:3px;background:rgba(0,255,231,0.2);border-radius:2px;outline:none;}
#player-limit-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--neon);box-shadow:0 0 8px var(--neon);cursor:pointer;}
#player-limit-val{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;color:var(--neon);min-width:24px;text-align:center;}
#custom-code-group.disabled{opacity:0.3;pointer-events:none;}
#create-room-btn{margin-top:auto;width:100%;padding:14px;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;letter-spacing:4px;border:2px solid var(--neon);background:transparent;color:var(--neon);cursor:pointer;text-transform:uppercase;text-shadow:0 0 10px var(--neon);box-shadow:0 0 20px rgba(0,255,231,0.15),inset 0 0 20px rgba(0,255,231,0.04);transition:all 0.18s;}
#create-room-btn:hover{background:rgba(0,255,231,0.1);box-shadow:0 0 36px rgba(0,255,231,0.35),inset 0 0 24px rgba(0,255,231,0.08);}
#lobby-back-btn{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;padding:6px 14px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.35);cursor:pointer;transition:all 0.15s;}
#lobby-back-btn:hover{border-color:rgba(255,255,255,0.35);color:rgba(255,255,255,0.7);}

/* STAGING / WAITING ROOM */
#staging-screen{display:none;position:fixed;inset:0;z-index:160;background:rgba(3,5,12,0.98);backdrop-filter:blur(10px);flex-direction:column;}
#staging-screen.open{display:flex;}
#staging-header{padding:22px 36px 16px;border-bottom:1px solid rgba(0,255,231,0.12);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;}
#staging-room-name{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;letter-spacing:5px;color:white;}
#staging-room-meta{display:flex;gap:16px;margin-top:5px;}
.staging-meta-item{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.35);}
.staging-meta-item span{color:rgba(0,255,231,0.7);}
#staging-code-display{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;color:var(--gold);text-shadow:0 0 8px var(--gold);background:rgba(255,170,0,0.06);border:1px solid rgba(255,170,0,0.2);padding:6px 14px;cursor:pointer;transition:all 0.15s;}
#staging-code-display:hover{background:rgba(255,170,0,0.12);}
#staging-code-copied{font-size:9px;letter-spacing:2px;color:rgba(255,170,0,0.5);margin-top:3px;text-align:right;opacity:0;transition:opacity 0.2s;}
#staging-body{display:flex;flex:1;min-height:0;}
#staging-players{width:55%;padding:24px 28px;border-right:1px solid rgba(0,255,231,0.1);display:flex;flex-direction:column;}
#staging-players h3,#staging-chat h3{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;color:rgba(0,255,231,0.6);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid rgba(0,255,231,0.08);}
#player-list{display:flex;flex-direction:column;gap:8px;flex:1;}
.player-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);animation:playerRowIn 0.25s ease;}
@keyframes playerRowIn{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:translateX(0);}}
.player-color-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.player-row-name{flex:1;font-size:13px;letter-spacing:1px;color:white;}
.player-row-tag{font-size:9px;letter-spacing:2px;padding:2px 8px;border-radius:2px;text-transform:uppercase;}
.tag-host{background:rgba(255,170,0,0.15);color:var(--gold);border:1px solid rgba(255,170,0,0.3);}
.tag-you{background:rgba(0,255,231,0.1);color:var(--neon);border:1px solid rgba(0,255,231,0.25);}
.tag-ready{background:rgba(0,255,100,0.1);color:#00ff88;border:1px solid rgba(0,255,100,0.25);}
.player-ping{font-size:10px;letter-spacing:1px;}
.kick-btn{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;padding:4px 10px;border:1px solid rgba(255,45,45,0.3);background:transparent;color:rgba(255,45,45,0.6);cursor:pointer;transition:all 0.15s;text-transform:uppercase;}
.kick-btn:hover{border-color:var(--red);color:var(--red);background:rgba(255,45,45,0.08);}
#staging-chat{width:45%;display:flex;flex-direction:column;padding:24px 20px;}
#chat-messages{flex:1;overflow-y:auto;min-height:0;display:flex;flex-direction:column;gap:6px;padding-right:4px;margin-bottom:12px;scrollbar-width:thin;scrollbar-color:rgba(0,255,231,0.15) transparent;}
#chat-messages::-webkit-scrollbar{width:3px;}
#chat-messages::-webkit-scrollbar-thumb{background:rgba(0,255,231,0.15);border-radius:2px;}
.chat-msg{font-size:11px;line-height:1.5;color:rgba(255,255,255,0.55);}
.chat-msg.system{color:rgba(0,255,231,0.4);font-style:italic;}
#chat-input-row{display:flex;gap:7px;}
#chat-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:white;font-family:'Share Tech Mono',monospace;font-size:12px;padding:8px 10px;outline:none;transition:border-color 0.15s;}
#chat-input:focus{border-color:rgba(0,255,231,0.3);}
#chat-input::placeholder{color:rgba(255,255,255,0.2);}
#chat-send{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;padding:8px 12px;border:1px solid rgba(0,255,231,0.2);background:transparent;color:rgba(0,255,231,0.5);cursor:pointer;transition:all 0.15s;}
#chat-send:hover{border-color:var(--neon);color:var(--neon);}
#staging-footer{padding:16px 28px;border-top:1px solid rgba(0,255,231,0.1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;}
#staging-status{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.3);}
.staging-status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;animation:dotPulse 1.5s ease infinite;}
.dot-waiting{background:#ffaa00;box-shadow:0 0 6px #ffaa00;}.dot-ready{background:#00ff88;box-shadow:0 0 6px #00ff88;}
#footer-left-btns{display:flex;gap:10px;}
#start-game-btn{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;letter-spacing:4px;padding:12px 32px;border:2px solid #00ff88;background:transparent;color:#00ff88;cursor:pointer;text-shadow:0 0 10px #00ff88;box-shadow:0 0 20px rgba(0,255,100,0.15);transition:all 0.18s;}
#start-game-btn:hover{background:rgba(0,255,100,0.1);box-shadow:0 0 36px rgba(0,255,100,0.3);}
#start-game-btn:disabled{opacity:0.35;cursor:not-allowed;box-shadow:none;}
#leave-room-btn{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;padding:12px 24px;border:2px solid var(--red);background:transparent;color:var(--red);cursor:pointer;transition:all 0.18s;}
#leave-room-btn:hover{background:rgba(255,45,45,0.1);}
#countdown-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.85);flex-direction:column;align-items:center;justify-content:center;}
#countdown-overlay.open{display:flex;}
#countdown-num{font-family:'Orbitron',sans-serif;font-size:clamp(80px,18vw,160px);font-weight:900;color:var(--neon);text-shadow:0 0 40px var(--neon),0 0 80px rgba(0,255,231,0.5);}
#countdown-label{font-size:12px;letter-spacing:6px;color:rgba(0,255,231,0.5);margin-top:10px;}
#lobby-toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;padding:10px 22px;background:rgba(10,20,35,0.95);border:1px solid rgba(0,255,231,0.25);color:var(--neon);z-index:300;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap;}
#lobby-toast.show{opacity:1;}
#lobby-toast.toast-error{border-color:rgba(255,45,45,0.4);color:var(--red);}
#lobby-toast.toast-ok{border-color:rgba(0,255,100,0.4);color:#00ff88;}
</head>
<body>
<canvas id="gameCanvas"></canvas>
<canvas id="weaponCanvas"></canvas>
<div id="ads-vignette"></div>
<div id="stance-indicator">CROUCHING</div>
<div id="damage-indicator"></div>
<div id="room-announce"></div>
<div id="boss-announce"></div>
<div id="room-clear-banner">ROOM CLEARED</div>

<!-- Minimap -->
<div id="minimap">
  <div id="minimap-label">RADAR</div>
  <canvas id="minimapCanvas" width="110" height="110"></canvas>
</div>

<!-- Enemy HP bars overlay canvas -->
<canvas id="enemy-hpbar-canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="scanlines"></div><div id="vignette"></div>
  <div id="hit-flash"></div><div id="kill-flash"></div><div id="fire-overlay"></div>
  <div id="crosshair"><div id="crosshair-dot"></div></div>
  <div id="health-bar-wrap">
    <div id="health-label">HEALTH</div>
    <div id="health-bar-bg"><div id="health-bar"></div></div>
    <div id="health-value">100</div>
  </div>
  <div id="ammo-display">
    <div id="ammo-label">AMMUNITION</div>
    <div id="ammo-count">30</div>
    <div id="ammo-reserve">/ 120</div>
  </div>
  <div id="score-display">
    <div id="score-label">SCORE</div>
    <div id="score-value">0</div>
    <div id="kills-display">KILLS: 0</div>
  </div>
  <div id="room-display">
    <div id="room-label">ROOM</div>
    <div id="room-value">1</div>
    <div id="enemies-left"></div>
  </div>
  <div id="boss-hpbar-wrap">
    <div id="boss-name">VOID TITAN</div>
    <div id="boss-hpbar-bg"><div id="boss-hpbar"></div></div>
  </div>
  <div id="active-powerups"></div>
  <div id="reload-text">RELOADING...</div>
</div>

<!-- POWERUP SCREEN -->
<div id="powerup-screen">
  <div id="pu-header">
    <div id="pu-room-badge">ROOM CLEARED</div>
    <div id="powerup-title">CHOOSE YOUR UPGRADE</div>
    <div id="powerup-subtitle">SELECT ONE POWER-UP TO CONTINUE</div>
    <div id="pu-health-limit"></div>
  </div>
  <div id="powerup-banners"></div>
</div>

<!-- PAUSE -->
<div class="overlay" id="pause-screen">
  <h1 style="font-size:clamp(26px,4vw,50px);">PAUSED</h1>
  <p style="margin-bottom:22px;font-size:11px;">GAME SUSPENDED</p>
  <button class="btn" id="resumeBtn">RESUME</button>
  <button class="btn" id="pauseSettingsBtn">SETTINGS</button>
  <button class="btn" id="pauseRestartBtn">RESTART</button>
  <button class="btn btn-red" id="exitBtn">EXIT TO MENU</button>
</div>

<!-- SETTINGS -->
<div id="settings-panel">
  <h2>SETTINGS</h2>
  <div class="settings-tabs">
    <button class="tab-btn active" data-tab="video">VIDEO</button>
    <button class="tab-btn" data-tab="controls">CONTROLS</button>
    <button class="tab-btn" data-tab="keybinds">KEYBINDS</button>
  </div>
  <div class="settings-box">
    <div class="tab-panel active" id="tab-video">
      <div class="setting-row"><span class="setting-label">Field of View</span>
        <div style="display:flex;align-items:center;gap:9px;"><input type="range" id="fov-slider" min="60" max="120" value="75"><span class="setting-val" id="fov-val">75</span></div></div>
      <div class="setting-row"><span class="setting-label">Sensitivity</span>
        <div style="display:flex;align-items:center;gap:9px;"><input type="range" id="sens-slider" min="1" max="500" value="180"><span class="setting-val" id="sens-val">180</span></div></div>
      <div class="setting-row"><span class="setting-label">ADS Sensitivity</span>
        <div style="display:flex;align-items:center;gap:9px;"><input type="range" id="ads-sens-slider" min="1" max="500" value="100"><span class="setting-val" id="ads-sens-val">100</span></div></div>
    </div>
    <div class="tab-panel" id="tab-controls">
      <div class="setting-row"><span class="setting-label">Invert Y</span>
        <button class="tab-btn" id="invertY-btn" style="min-width:56px;">OFF</button></div>
    </div>
    <div class="tab-panel" id="tab-keybinds">
      <div class="keybind-row"><span class="keybind-label">Forward</span><button class="keybind-btn" data-action="forward">W</button></div>
      <div class="keybind-row"><span class="keybind-label">Back</span><button class="keybind-btn" data-action="back">S</button></div>
      <div class="keybind-row"><span class="keybind-label">Left</span><button class="keybind-btn" data-action="left">A</button></div>
      <div class="keybind-row"><span class="keybind-label">Right</span><button class="keybind-btn" data-action="right">D</button></div>
      <div class="keybind-row"><span class="keybind-label">Jump</span><button class="keybind-btn" data-action="jump">SPACE</button></div>
      <div class="keybind-row"><span class="keybind-label">Sprint</span><button class="keybind-btn" data-action="sprint">LSHIFT</button></div>
      <div class="keybind-row"><span class="keybind-label">Crouch/Slide</span><button class="keybind-btn" data-action="crouch">C</button></div>
      <div class="keybind-row"><span class="keybind-label">Reload</span><button class="keybind-btn" data-action="reload">R</button></div>
    </div>
  </div>
  <button class="btn settings-back" id="settingsBackBtn">BACK</button>
</div>

<!-- START SCREEN -->
<div class="overlay" id="start-screen">
  <svg class="menu-gun" viewBox="0 0 520 160" xmlns="http://www.w3.org/2000/svg">
    <rect x="10" y="62" width="190" height="20" rx="3" fill="#0e1a2e"/>
    <rect x="0" y="58" width="22" height="28" rx="3" fill="#0a1220"/>
    <rect x="4" y="63" width="4" height="18" rx="1" fill="#050a12"/>
    <rect x="11" y="63" width="4" height="18" rx="1" fill="#050a12"/>
    <rect x="190" y="52" width="220" height="40" rx="4" fill="#0d1828"/>
    <rect x="185" y="46" width="200" height="12" rx="2" fill="#0a1420"/>
    <line x1="200" y1="46" x2="200" y2="58" stroke="#162030" stroke-width="2"/>
    <line x1="220" y1="46" x2="220" y2="58" stroke="#162030" stroke-width="2"/>
    <line x1="240" y1="46" x2="240" y2="58" stroke="#162030" stroke-width="2"/>
    <line x1="260" y1="46" x2="260" y2="58" stroke="#162030" stroke-width="2"/>
    <line x1="280" y1="46" x2="280" y2="58" stroke="#162030" stroke-width="2"/>
    <line x1="300" y1="46" x2="300" y2="58" stroke="#162030" stroke-width="2"/>
    <line x1="320" y1="46" x2="320" y2="58" stroke="#162030" stroke-width="2"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ── Renderer ──
const canvas = document.getElementById('gameCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false;
renderer.setClearColor(0x050810);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050810, 0.03);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.05, 300);
camera.position.set(0, 1.7, 0);

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  if(typeof wRenderer !== 'undefined') {
    wRenderer.setSize(window.innerWidth, window.innerHeight);
    wCamera.aspect = window.innerWidth / window.innerHeight;
    wCamera.updateProjectionMatrix();
  }
});

// ── Lighting ──
scene.add(new THREE.AmbientLight(0x101828, 1.6));
function addPL(x,y,z,col,i,d){ const l=new THREE.PointLight(col,i,d); l.position.set(x,y,z); scene.add(l); return l; }
addPL(0,8,0,0x2244aa,2,60);
addPL(-15,5,-15,0x00ffe7,0.9,24);
addPL(15,5,15,0xff2244,0.8,24);
addPL(-15,5,15,0x2244aa,0.6,20);
addPL(15,5,-15,0x00ffe7,0.6,20);

// ── Settings ──
const settings = {
  fov: 75, sens: 0.0018, adsSens: 0.001, invertY: false,
  keys: { forward:'KeyW', back:'KeyS', left:'KeyA', right:'KeyD', jump:'Space', sprint:'ShiftLeft', crouch:'KeyC', reload:'KeyR' }
};
function sliderToSens(v) { return (v / 500) * 0.004; }

// ══════════════════════════════════════════════════
// ── ROOM BUILDER ──
// ══════════════════════════════════════════════════

// Core world state
const worldGroup = new THREE.Group();
scene.add(worldGroup);
const covers = [];
let arenaSize = 38;
const roomLights = []; // tracked per-room lights to remove on room change

function addRoomLight(x,y,z,col,intensity,dist){
  const l=new THREE.PointLight(col,intensity,dist);
  l.position.set(x,y,z); scene.add(l); roomLights.push(l); return l;
}
function clearRoomLights(){
  roomLights.forEach(l=>scene.remove(l)); roomLights.length=0;
}

// Room style themes
const ROOM_THEMES = [
  // Theme 0: standard bunker (rooms 1-9)
  { floorCol:0x080d1a, wallCol:0x0d1428, ceilCol:0x060b16, accentCol:0x00ffe7, fogCol:0x050810, fogDen:0.03 },
  // Theme 1: blood arena (rooms 10-19, after first boss)
  { floorCol:0x0e0608, wallCol:0x1a0810, ceilCol:0x0a0408, accentCol:0xff2244, fogCol:0x0e0408, fogDen:0.028 },
  // Theme 2: void temple (rooms 20-29)
  { floorCol:0x060810, wallCol:0x08101e, ceilCol:0x050810, accentCol:0xaa00ff, fogCol:0x060410, fogDen:0.028 },
  // Theme 3: industrial (rooms 30-39)
  { floorCol:0x0a0c08, wallCol:0x121408, ceilCol:0x080a06, accentCol:0x88ff00, fogCol:0x080a06, fogDen:0.025 },
  // Theme 4: final (rooms 40-50)
  { floorCol:0x0d0404, wallCol:0x150808, ceilCol:0x0a0202, accentCol:0xff4400, fogCol:0x0d0004, fogDen:0.022 },
];

let doorPortal = null;      // {mesh, light, ring, active}
let doorTriggerZ = 0;       // Z position where player enters next room

function getTheme(r) {
  if(r<=9)  return ROOM_THEMES[0];
  if(r<=19) return ROOM_THEMES[1];
  if(r<=29) return ROOM_THEMES[2];
  if(r<=39) return ROOM_THEMES[3];
  return ROOM_THEMES[4];
}

function buildRoom(sz, isFinalBoss) {
  // Clear world
  clearRoomLights();
  while(worldGroup.children.length) worldGroup.remove(worldGroup.children[0]);
  covers.length = 0;
  arenaSize = sz;

  const theme = getTheme(room);
  const floorM = new THREE.MeshStandardMaterial({ color: theme.floorCol, roughness: 0.95, metalness: 0.1 });
  const wallM  = new THREE.MeshStandardMaterial({ color: theme.wallCol,  roughness: 0.75, metalness: 0.35 });
  const ceilM  = new THREE.MeshStandardMaterial({ color: theme.ceilCol,  roughness: 0.9 });
  const trimM  = new THREE.MeshStandardMaterial({ color: theme.accentCol, emissive: theme.accentCol, emissiveIntensity: 0.4, roughness: 0.3 });
  const darkM  = new THREE.MeshStandardMaterial({ color: 0x050810, roughness: 1 });

  const W = sz * 2;   // room full width
  const D = sz * 2;   // room full depth
  const H = 10;       // ceiling height
  const wt = 1.2;     // wall thickness

  // ── Floor ──
  const fl = new THREE.Mesh(new THREE.PlaneGeometry(W, D, 30, 30), floorM);
  fl.rotation.x = -Math.PI / 2; worldGroup.add(fl);

  // Floor grid
  const grid = new THREE.GridHelper(W, Math.floor(W/2), 0x001020, 0x001020);
  grid.position.y = 0.01; worldGroup.add(grid);

  // ── Ceiling ──
  const cl = new THREE.Mesh(new THREE.PlaneGeometry(W, D), ceilM);
  cl.rotation.x = Math.PI / 2; cl.position.y = H; worldGroup.add(cl);

  // ── Outer walls (solid box walls with thickness) ──
  function addWall(w, h, d, x, y, z, mat) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    m.position.set(x, y, z);
    worldGroup.add(m);
    return m;
  }

  // North wall (back, +Z)  — has the EXIT DOOR in the center
  const doorW = 4, doorH = 6;
  // North wall left chunk
  addWall((W/2 - doorW/2), H, wt, -(W/4 + doorW/4), H/2, sz);
  // North wall right chunk
  addWall((W/2 - doorW/2), H, wt,  (W/4 + doorW/4), H/2, sz);
  // North wall above door
  addWall(doorW, H - doorH, wt, 0, doorH + (H-doorH)/2, sz);

  // South wall (front, -Z) — solid
  addWall(W, H, wt, 0, H/2, -sz);
  // West wall (-X)
  addWall(wt, H, D, -sz, H/2, 0);
  // East wall (+X)
  addWall(wt, H, D,  sz, H/2, 0);

  // Collision for walls
  covers.push({ minX:-sz, maxX:sz, minZ:-sz, maxZ:-sz+wt+0.5 });  // south
  covers.push({ minX:-sz, maxX:-(sz-wt-0.5), minZ:-sz, maxZ:sz }); // west
  covers.push({ minX:sz-wt-0.5, maxX:sz, minZ:-sz, maxZ:sz });     // east
  // North wall sides (not the door gap)
  covers.push({ minX:-sz, maxX:-(doorW/2), minZ:sz-wt-0.5, maxZ:sz });
  covers.push({ minX:doorW/2, maxX:sz, minZ:sz-wt-0.5, maxZ:sz });

  // Door position on north wall (player walks to +Z)
  doorTriggerZ = sz - 2;

  // ── Neon trim strips (floor-level and ceiling-level) ──
  function addTrim(w, h, d, x, y, z) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), trimM);
    m.position.set(x, y, z);
    worldGroup.add(m);
  }
  // Floor trim along walls
  addTrim(W, 0.06, 0.06,  0,    0.03, -sz+wt/2);
  addTrim(W, 0.06, 0.06,  0,    0.03,  sz-wt/2);
  addTrim(0.06, 0.06, D, -sz+wt/2, 0.03, 0);
  addTrim(0.06, 0.06, D,  sz-wt/2, 0.03, 0);
  // Ceiling trim
  addTrim(W, 0.06, 0.06,  0,    H-0.03, -sz+wt/2);
  addTrim(W, 0.06, 0.06,  0,    H-0.03,  sz-wt/2);

  // Neon strip lights along ceiling edges
  addRoomLight(0, H-1, -sz+2, theme.accentCol, 1.5, 25);
  addRoomLight(0, H-1,  sz-2, theme.accentCol, 0.8, 20);
  addRoomLight(-sz+2, H-1, 0, theme.accentCol, 1.0, 22);
  addRoomLight( sz+2, H-1, 0, theme.accentCol, 1.0, 22);

  // ── Inner room structure ──
  const rng = mulberry32(room * 12345); // deterministic per room

  // LAYOUT A: Corridor-style with side alcoves
  if(!isFinalBoss) {
    buildRoomLayout(sz, wallM, darkM, rng);
  } else {
    buildFinalBossLayout(sz, wallM, trimM);
  }

  // ── Ceiling lamps ──
  const lampCols = Math.ceil(W / 12), lampRows = Math.ceil(D / 12);
  for(let r2=0;r2<lampRows;r2++) for(let c2=0;c2<lampCols;c2++) {
    const lx = -sz + (c2+0.5)*(W/lampCols);
    const lz = -sz + (r2+0.5)*(D/lampRows);
    // Lamp housing
    const lamp = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.12,0.6), new THREE.MeshStandardMaterial({color:0x1a1a2e}));
    lamp.position.set(lx, H-0.08, lz); worldGroup.add(lamp);
    const bulb = new THREE.Mesh(new THREE.PlaneGeometry(0.5,0.5), new THREE.MeshStandardMaterial({color:0xeeeeff,emissive:0xeeeeff,emissiveIntensity:1.2}));
    bulb.rotation.x = Math.PI/2; bulb.position.set(lx, H-0.14, lz); worldGroup.add(bulb);
    if(r2%2===0&&c2%2===0) addRoomLight(lx, H-1, lz, 0xaabbdd, 0.8, 18);
  }

  // Fog / bg for theme
  scene.fog = new THREE.FogExp2(theme.fogCol, theme.fogDen);
}

// Seeded random for deterministic layouts
function mulberry32(a) {
  return function() {
    a|=0; a=a+0x6D2B79F5|0;
    let t=Math.imul(a^a>>>15,1|a);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}

function buildRoomLayout(sz, wallM, darkM, rng) {
  const W = sz * 2;
  const H = 10;

  // Pick a layout style based on room number
  const style = room % 4;

  if(style === 0) {
    // ── LAYOUT: Central corridor with two side channels ──
    const corridorW = sz * 0.55;
    // Two inner walls creating side channels
    for(const sx of [-1, 1]) {
      const wx = sx * corridorW;
      // Long partial wall with gap in middle
      const wallLen = sz * 0.8;
      addInnerWall(wx, H*0.75, 1.2, wx, H*0.75/2, -sz*0.1, wallM);
      addInnerWall(wx, H*0.75, 1.2, wx, H*0.75/2,  sz*0.55, wallM);
      // Short cross walls (cover)
      addInnerWall(sz*0.35, 1.8, 1.2, wx - sx*sz*0.175, 0.9, sz*0.2, wallM);
    }
    // Scatter crates along corridor
    for(let i=0;i<6;i++){
      const cz = -sz*0.6 + i * sz*0.22;
      const cx = (rng()-0.5)*corridorW*0.8;
      if(Math.abs(cz)<4) continue;
      addCrate(cx, cz, wallM, rng);
    }

  } else if(style === 1) {
    // ── LAYOUT: L-shaped cover clusters ──
    const clusters = [[sz*0.35, sz*0.3], [-sz*0.35, sz*0.3], [sz*0.3, -sz*0.25], [-sz*0.3, -sz*0.25]];
    clusters.forEach(([cx, cz]) => {
      // L-shape: two walls
      addInnerWall(sz*0.28, 1.8, 1.0, cx, 0.9, cz, wallM);
      addInnerWall(1.0, 1.8, sz*0.18, cx+sz*0.135, 0.9, cz + sz*0.09, wallM);
      addCrate(cx - sz*0.1, cz + sz*0.05, wallM, rng);
    });
    // Central pillar cluster
    for(let i=0;i<4;i++){
      const a = (i/4)*Math.PI*2;
      addPillar(Math.cos(a)*sz*0.15, Math.sin(a)*sz*0.15, sz*0.06, H, wallM);
    }

  } else if(style === 2) {
    // ── LAYOUT: Open room with scattered cover ──
    const coverCount = 8 + Math.floor(room/5);
    for(let i=0;i<coverCount;i++){
      const cx = (rng()-0.5)*sz*1.4;
      const cz = (rng()-0.5)*sz*1.2;
      if(Math.abs(cx)<3&&Math.abs(cz)<4) continue;
      if(cz > sz*0.7) continue; // keep near-door area clear
      if(rng()<0.5) addCrate(cx,cz,wallM,rng);
      else addInnerWall(sz*0.15+rng()*sz*0.2, 1.5+rng()*1.5, 1.0, cx, (1.5+rng()*1.5)/2, cz, wallM);
    }

  } else {
    // ── LAYOUT: Chokepoint center wall ──
    // Big center wall with two gaps
    const centerZ = sz*0.1;
    const gapW = sz*0.28;
    addInnerWall(sz*0.6 - gapW*1.5, H*0.8, 1.2, -sz*0.5 - gapW*0.25, H*0.8/2, centerZ, wallM);
    addInnerWall(sz*0.6 - gapW*1.5, H*0.8, 1.2,  sz*0.5 + gapW*0.25, H*0.8/2, centerZ, wallM);
    // Back cover near door
    for(let i=0;i<4;i++){
      const cx = (i - 1.5)*sz*0.35;
      addCrate(cx, sz*0.55, wallM, rng);
    }
    // Front scatter
    for(let i=0;i<3;i++){
      addCrate((rng()-0.5)*sz*1.2, -sz*0.4+rng()*sz*0.3, wallM, rng);
    }
  }

  // Neon pillars at corners
  const pc = sz * 0.78;
  [[pc,pc],[pc,-pc],[-pc,pc],[-pc,-pc]].forEach(([px,pz])=>{
    addPillar(px, pz, 0.28, H, wallM);
    const pm2 = new THREE.Mesh(new THREE.CylinderGeometry(0.30,0.30,H,8),
      new THREE.MeshStandardMaterial({color:getTheme(room).accentCol,emissive:getTheme(room).accentCol,emissiveIntensity:0.7,transparent:true,opacity:0.25}));
    pm2.position.set(px, H/2, pz);
    worldGroup.add(pm2);
    addRoomLight(px, H/2, pz, getTheme(room).accentCol, 1.2, 14);
    covers.push({minX:px-0.32,maxX:px+0.32,minZ:pz-0.32,maxZ:pz+0.32});
  });
}

function buildFinalBossLayout(sz, wallM, trimM) {
  const H = 10;
  // Massive circular columns around the perimeter
  for(let i=0;i<12;i++){
    const a = (i/12)*Math.PI*2;
    const r = sz*0.72;
    addPillar(Math.cos(a)*r, Math.sin(a)*r, 0.7, H, wallM);
    addRoomLight(Math.cos(a)*r, H/2, Math.sin(a)*r, 0xff2200, 1.2, 14);
    // Connecting arch beams (decorative boxes near ceiling)
    const a2 = ((i+0.5)/12)*Math.PI*2;
    const beam = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.3,(Math.PI*2*r/12)*0.92), new THREE.MeshStandardMaterial({color:0x100010,roughness:0.7}));
    beam.position.set(Math.cos(a2)*r*0.95, H-0.25, Math.sin(a2)*r*0.95);
    beam.rotation.y = -a2; worldGroup.add(beam);
  }
  // Central ritual platform
  const plat = new THREE.Mesh(new THREE.CylinderGeometry(sz*0.22, sz*0.22, 0.3, 12),
    new THREE.MeshStandardMaterial({color:0x1a0008,roughness:0.3,metalness:0.9}));
  plat.position.set(0, 0.15, -sz*0.25); worldGroup.add(plat);
  // Platform trim ring
  const ring = new THREE.Mesh(new THREE.TorusGeometry(sz*0.22, 0.08, 8, 32),
    new THREE.MeshStandardMaterial({color:0xff0000,emissive:0xff0000,emissiveIntensity:2}));
  ring.rotation.x = Math.PI/2; ring.position.set(0, 0.32, -sz*0.25); worldGroup.add(ring);
  addRoomLight(0, 2, -sz*0.25, 0xff0000, 3, 18);
  // Cover blocks scattered
  for(let i=0;i<8;i++){
    const a = (i/8)*Math.PI*2;
    const r = sz*0.45;
    addCrate(Math.cos(a)*r, Math.sin(a)*r, wallM, ()=>0.5);
  }
}

function addInnerWall(w, h, d, x, y, z, mat) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z); worldGroup.add(m);
  covers.push({ minX:x-w/2-0.1, maxX:x+w/2+0.1, minZ:z-d/2-0.1, maxZ:z+d/2+0.1 });
}

function addPillar(x, z, radius, h, mat) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, h, 8), mat);
  m.position.set(x, h/2, z); worldGroup.add(m);
  covers.push({ minX:x-radius-0.1, maxX:x+radius+0.1, minZ:z-radius-0.1, maxZ:z+radius+0.1 });
}

function addCrate(cx, cz, mat, rng) {
  const w = 1.2+rng()*1.2, h = 0.9+rng()*1.2;
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, w), mat);
  m.position.set(cx, h/2, cz); worldGroup.add(m);
  covers.push({ minX:cx-w/2-0.1, maxX:cx+w/2+0.1, minZ:cz-w/2-0.1, maxZ:cz+w/2+0.1 });
  // Stacked crate sometimes
  if(rng()<0.3){
    const w2=w*0.7, h2=h*0.8;
    const m2=new THREE.Mesh(new THREE.BoxGeometry(w2,h2,w2),mat);
    m2.position.set(cx+(rng()-0.5)*0.3, h+h2/2, cz+(rng()-0.5)*0.3); worldGroup.add(m2);
  }
}

// ── DOOR PORTAL ──
function spawnDoorPortal() {
  // Remove old portal
  if(doorPortal) {
    scene.remove(doorPortal.group);
    doorPortal = null;
  }

  const group = new THREE.Group();

  // Door frame (two vertical posts + top bar)
  const frameMat = new THREE.MeshStandardMaterial({color:0x0a1a30, roughness:0.4, metalness:0.9});
  const glowMat  = new THREE.MeshStandardMaterial({color:0x0066ff, emissive:0x0066ff, emissiveIntensity:3, transparent:true, opacity:0.9});
  const glowMatS = new THREE.MeshStandardMaterial({color:0x44aaff, emissive:0x44aaff, emissiveIntensity:2, transparent:true, opacity:0.6});

  // Frame posts
  const postGeo = new THREE.BoxGeometry(0.3, 6, 0.3);
  const postL = new THREE.Mesh(postGeo, frameMat); postL.position.set(-2, 3, 0); group.add(postL);
  const postR = new THREE.Mesh(postGeo, frameMat); postR.position.set( 2, 3, 0); group.add(postR);
  // Top bar
  const topBar = new THREE.Mesh(new THREE.BoxGeometry(4.6, 0.3, 0.3), frameMat); topBar.position.set(0, 6.15, 0); group.add(topBar);

  // Neon edge strips on frame
  const edgeM = new THREE.MeshStandardMaterial({color:0x0044ff,emissive:0x0044ff,emissiveIntensity:4});
  const edgeL = new THREE.Mesh(new THREE.BoxGeometry(0.06,6.3,0.06),edgeM); edgeL.position.set(-2.12,3,0); group.add(edgeL);
  const edgeR = new THREE.Mesh(new THREE.BoxGeometry(0.06,6.3,0.06),edgeM); edgeR.position.set( 2.12,3,0); group.add(edgeR);
  const edgeT = new THREE.Mesh(new THREE.BoxGeometry(4.7,0.06,0.06),edgeM); edgeT.position.set(0,6.3,0); group.add(edgeT);

  // Portal plane (shimmering energy field)
  const portalGeo = new THREE.PlaneGeometry(3.8, 6);
  const portalMat = new THREE.MeshStandardMaterial({
    color:0x0044cc, emissive:0x0055ff, emissiveIntensity:1.8,
    transparent:true, opacity:0.55, side:THREE.DoubleSide
  });
  const portal = new THREE.Mesh(portalGeo, portalMat);
  portal.position.set(0, 3, 0); group.add(portal);

  // Inner shimmer layer
  const shimMat = new THREE.MeshStandardMaterial({color:0x88ccff,emissive:0x88ccff,emissiveIntensity:1,transparent:true,opacity:0.25,side:THREE.DoubleSide});
  const shim = new THREE.Mesh(new THREE.PlaneGeometry(3.4, 5.6), shimMat);
  shim.position.set(0, 3, 0.02); group.add(shim);

  // Swirling torus ring
  const ringGeo = new THREE.TorusGeometry(2.1, 0.08, 8, 40);
  const ring = new THREE.Mesh(ringGeo, glowMat); ring.position.set(0,3,0); group.add(ring);
  const ring2 = new THREE.Mesh(new THREE.TorusGeometry(1.5, 0.05, 6, 32), glowMatS);
  ring2.position.set(0,3,0); group.add(ring2);

  // Particle orbs orbiting the portal
  const orbMat = new THREE.MeshStandardMaterial({color:0x44aaff,emissive:0x44aaff,emissiveIntensity:3});
  const orbs = [];
  for(let i=0;i<8;i++){
    const orb = new THREE.Mesh(new THREE.SphereGeometry(0.10,6,6), orbMat);
    group.add(orb); orbs.push(orb);
  }

  // Point lights
  const pL1 = new THREE.PointLight(0x0066ff, 4, 18);
  const pL2 = new THREE.PointLight(0x44aaff, 2, 10);
  pL1.position.set(0,3,0); pL2.position.set(0,3,1);
  group.add(pL1); group.add(pL2);

  // "NEXT ROOM" floating text plane
  // (We'll handle this as a CSS label in the HUD)

  group.position.set(0, 0, arenaSize - 0.6);
  scene.add(group);

  doorPortal = { group, portal, ring, ring2, orbs, pL1, pL2, active:true };
  showDoorHint(true);
}

function removeDoorPortal() {
  if(doorPortal) { scene.remove(doorPortal.group); doorPortal=null; }
  showDoorHint(false);
}

function updateDoorPortal(dt) {
  if(!doorPortal||!doorPortal.active) return;
  const now = performance.now()/1000;

  // Spin rings
  doorPortal.ring.rotation.z  += dt * 1.4;
  doorPortal.ring.rotation.x  += dt * 0.6;
  doorPortal.ring2.rotation.z -= dt * 2.0;
  doorPortal.ring2.rotation.y += dt * 0.8;

  // Pulse portal opacity
  doorPortal.portal.material.opacity = 0.45 + Math.sin(now*3)*0.15;
  doorPortal.portal.material.emissiveIntensity = 1.6 + Math.sin(now*2.5)*0.6;

  // Orbit orbs
  doorPortal.orbs.forEach((orb,i)=>{
    const a = (i/8)*Math.PI*2 + now*1.2;
    const r = 2.3 + Math.sin(now*2+i)*0.2;
    orb.position.set(Math.cos(a)*r, 3+Math.sin(now*1.5+i*0.8)*0.5, Math.sin(a)*r);
  });

  // Pulse lights
  doorPortal.pL1.intensity = 3 + Math.sin(now*4)*1.5;

  // Check player proximity — walk through portal
  const dx = camera.position.x;
  const dz = camera.position.z - (arenaSize - 0.6);
  const dist = Math.sqrt(dx*dx + dz*dz);
  if(dist < 2.5 && camera.position.z > arenaSize - 3) {
    triggerDoorTransition();
  }
}

function showDoorHint(show) {
  let hint = document.getElementById('door-hint');
  if(!hint) {
    hint = document.createElement('div');
    hint.id = 'door-hint';
    hint.style.cssText = `
      position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);
      font-family:'Orbitron',sans-serif;font-size:13px;letter-spacing:4px;
      color:#44aaff;text-shadow:0 0 16px #0066ff;
      pointer-events:none;z-index:12;opacity:0;transition:opacity 0.5s;
      text-align:center;
    `;
    hint.innerHTML = 'PORTAL ACTIVE<br><span style="font-size:10px;letter-spacing:3px;color:rgba(68,170,255,0.6);">WALK THROUGH TO CONTINUE</span>';
    document.body.appendChild(hint);
  }
  hint.style.opacity = show ? '1' : '0';
}

let transitioning = false;
function triggerDoorTransition() {
  if(transitioning || roomPhase !== 'door') return;
  transitioning = true;
  showDoorHint(false);

  // Screen flash to white then black
  const flash = document.createElement('div');
  flash.style.cssText = 'position:fixed;inset:0;background:white;z-index:300;opacity:0;transition:opacity 0.2s;pointer-events:none;';
  document.body.appendChild(flash);
  setTimeout(()=>{ flash.style.opacity='1'; }, 10);
  setTimeout(()=>{
    flash.style.background='black';
    removeDoorPortal();
    // Show powerup screen (game is paused in dark)
    if(room>=MAX_ROOM) { showWinScreen(); flash.remove(); transitioning=false; return; }
    showPowerupScreen();
    flash.style.opacity='0';
    setTimeout(()=>flash.remove(), 300);
    transitioning=false;
  }, 250);
}

function checkColl(nx,nz,r=0.45){
  if(nx<-arenaSize+r||nx>arenaSize-r||nz<-arenaSize+r||nz>arenaSize-r) return true;
  for(const c of covers) if(nx>c.minX-r&&nx<c.maxX+r&&nz>c.minZ-r&&nz<c.maxZ+r) return true;
  return false;
}

// Projectile system (boss attacks)
const projectiles = [];
const PROJ_GEO  = new THREE.SphereGeometry(0.18, 6, 6);
const PROJ_GEO2 = new THREE.SphereGeometry(0.32, 6, 6);

function spawnProjectile(origin, direction, speed, damage, col, big=false) {
  const mat = new THREE.MeshStandardMaterial({ color:col, emissive:col, emissiveIntensity:3, transparent:true, opacity:0.92 });
  const mesh = new THREE.Mesh(big ? PROJ_GEO2 : PROJ_GEO, mat);
  mesh.position.copy(origin);
  const pLight = new THREE.PointLight(col, big?2.5:1.5, big?5:3);
  pLight.position.copy(origin);
  scene.add(mesh); scene.add(pLight);
  projectiles.push({ mesh, pLight, vel: direction.clone().normalize().multiplyScalar(speed), damage, life: 6, big });
}

function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.life -= dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    p.pLight.position.copy(p.mesh.position);
    p.mesh.rotation.x += dt * 3; p.mesh.rotation.z += dt * 2;

    // Hit player
    const dist = p.mesh.position.distanceTo(camera.position);
    if (dist < (p.big ? 1.2 : 0.8)) {
      damagePlayer(p.damage);
      showHitFlash();
      scene.remove(p.mesh); scene.remove(p.pLight);
      projectiles.splice(i, 1);
      continue;
    }
    // Expire
    if (p.life <= 0 || p.mesh.position.y < -2) {
      scene.remove(p.mesh); scene.remove(p.pLight);
      projectiles.splice(i, 1);
    }
  }
}

  // Tier 1 — Room 10: VOID TITAN (basic melee + slow shots)
  { name:'VOID TITAN',     col:0xff6600, sc:1.2, hp:400,  spd:2.2, dmg:25, tier:1 },
  // Tier 2 — Room 20: SHADOW LORD (faster, spread shots)
  { name:'SHADOW LORD',    col:0xaa00ff, sc:1.5, hp:750,  spd:2.8, dmg:32, tier:2 },
  // Tier 3 — Room 30: BLOOD REAPER (charge + burst fire)
  { name:'BLOOD REAPER',   col:0xff0066, sc:1.8, hp:1200, spd:3.4, dmg:40, tier:3 },
  // Tier 4 — Room 40: NEXUS EMPEROR (spawns minions + heavy barrage)
  { name:'NEXUS EMPEROR',  col:0x00ffcc, sc:2.1, hp:1800, spd:3.0, dmg:48, tier:4 },
  // Tier 5 — Room 50: THE VOID (all patterns, enrages, phase 2)
  { name:'THE VOID',       col:0xff0000, sc:2.6, hp:3000, spd:2.0, dmg:60, tier:5 },
];

function spawnBoss(r) {
  if(boss&&boss.alive) scene.remove(boss.group);
  boss = null;

  const tierIdx = Math.min(4, Math.floor((r-1)/10));
  const def = BOSS_DEFS[tierIdx];
  const g = new THREE.Group();

  const col = def.col;
  const bM = new THREE.MeshStandardMaterial({color:0x060010,roughness:0.3,metalness:0.95});
  const aM = new THREE.MeshStandardMaterial({color:col,roughness:0.2,metalness:0.88,emissive:col,emissiveIntensity:0.3});
  const gM = new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:3.5});

  const sc = def.sc;

  // ── Body ──
  // Legs
  for(const sx of[-0.44,0.44]){
    const ul=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.65,0.3),bM); ul.position.set(sx,-0.95,0); g.add(ul);
    const ll=new THREE.Mesh(new THREE.BoxGeometry(0.26,0.55,0.26),bM); ll.position.set(sx,-1.62,0.06); g.add(ll);
    const ft=new THREE.Mesh(new THREE.BoxGeometry(0.38,0.18,0.56),aM); ft.position.set(sx,-1.98,0.12); g.add(ft);
    // Knee spike
    const ks=new THREE.Mesh(new THREE.ConeGeometry(0.05,0.22,5),gM); ks.position.set(sx,-1.38,0.18); ks.rotation.x=-0.6; g.add(ks);
  }
  // Torso
  const torso=new THREE.Mesh(new THREE.BoxGeometry(1.2,1.0,0.7),bM); torso.position.set(0,-0.08,0); g.add(torso);
  const chestA=new THREE.Mesh(new THREE.BoxGeometry(1.0,0.78,0.14),aM); chestA.position.set(0,-0.08,0.38); g.add(chestA);
  // Shoulder pads
  for(const sx of[-0.75,0.75]){
    const sp=new THREE.Mesh(new THREE.BoxGeometry(0.32,0.50,0.50),aM); sp.position.set(sx,0.15,0); g.add(sp);
    // Shoulder spike
    const ss=new THREE.Mesh(new THREE.ConeGeometry(0.06,0.35,5),gM); ss.position.set(sx,0.52,0); g.add(ss);
  }
  // Arms
  for(const sx of[-0.82,0.82]){
    const ua=new THREE.Mesh(new THREE.BoxGeometry(0.30,0.60,0.30),bM); ua.position.set(sx,-0.42,0); g.add(ua);
    const la=new THREE.Mesh(new THREE.BoxGeometry(0.26,0.55,0.26),bM); la.position.set(sx,-1.00,0); g.add(la);
    const hand=new THREE.Mesh(new THREE.BoxGeometry(0.36,0.30,0.36),aM); hand.position.set(sx,-1.32,0.04); g.add(hand);
    // Claws (3 per hand)
    for(let ci=-1;ci<=1;ci++){
      const cl=new THREE.Mesh(new THREE.ConeGeometry(0.035,0.30,4),gM);
      cl.position.set(sx+ci*0.10,-1.55,0.08); g.add(cl);
    }
    // Cannon on right arm (tiers 2+)
    if(sx>0 && tierIdx>=1){
      const can=new THREE.Mesh(new THREE.CylinderGeometry(0.10,0.14,0.65,7),aM);
      can.rotation.x=Math.PI/2; can.position.set(sx,-1.00,0.28); g.add(can);
      const canz=new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.10,0.12,6),gM);
      canz.rotation.x=Math.PI/2; canz.position.set(sx,-1.00,0.62); g.add(canz);
    }
  }
  // Waist
  const waist=new THREE.Mesh(new THREE.BoxGeometry(1.0,0.18,0.60),bM); waist.position.set(0,-0.60,0); g.add(waist);
  // Head
  const head=new THREE.Mesh(new THREE.BoxGeometry(0.84,0.68,0.62),bM); head.position.set(0,0.80,0); g.add(head);
  const visor=new THREE.Mesh(new THREE.BoxGeometry(0.66,0.20,0.14),gM); visor.position.set(0,0.80,0.33); g.add(visor);
  // Crown spikes
  const crownCount = 5 + tierIdx * 2;
  for(let ci=0;ci<crownCount;ci++){
    const angle = (ci/crownCount)*Math.PI*2;
    const sp=new THREE.Mesh(new THREE.ConeGeometry(0.055,0.40,5),gM);
    sp.position.set(Math.cos(angle)*0.32,1.30+Math.sin(ci)*0.08,Math.sin(angle)*0.20);
    g.add(sp);
  }
  // Back spines (tier 3+)
  if(tierIdx>=2){
    for(let bi=0;bi<5;bi++){
      const sp=new THREE.Mesh(new THREE.ConeGeometry(0.04,0.38+bi*0.06,4),gM);
      sp.position.set(0,-0.2+bi*0.22,-0.42); sp.rotation.x=0.6; g.add(sp);
    }
  }
  // Energy cores (chest gems)
  const cores=[];
  const corePositions = [[0,-0.08,0.40],[0.30,-0.20,0.38],[-0.30,-0.20,0.38],[0,0.10,0.38]];
  corePositions.forEach(([ox,oy,oz])=>{
    const c=new THREE.Mesh(new THREE.OctahedronGeometry(0.12,0),gM);
    c.position.set(ox,oy,oz); g.add(c); cores.push(c);
  });
  // Boss light
  const bLight=new THREE.PointLight(col,3.5,20); g.add(bLight);
  // Extra lights for final boss
  if(tierIdx===4){
    const l2=new THREE.PointLight(0xff4400,2,15); l2.position.set(0,2,0); g.add(l2);
    const l3=new THREE.PointLight(0x8800ff,2,15); l3.position.set(0,-1,0); g.add(l3);
  }

  g.scale.setScalar(sc);
  g.position.set(0, 2.2*sc, -(arenaSize*0.55));
  scene.add(g);

  document.getElementById('boss-name').textContent = def.name;
  document.getElementById('boss-hpbar-wrap').style.display = 'block';
  document.getElementById('boss-hpbar').style.width = '100%';
  // Color the bar to match boss
  document.getElementById('boss-hpbar').style.background = `linear-gradient(90deg, #${Math.floor(col/256/256).toString(16).padStart(2,'0')}0000, #${col.toString(16).padStart(6,'0')})`;

  boss = {
    group:g, hp:def.hp, maxHp:def.hp, alive:true,
    tier:tierIdx+1, def, cores, col, sc,
    lastShot:0, lastSpecial:0, lastCharge:0, lastSpawn:0,
    speed:def.spd, dmg:def.dmg,
    // attack state
    charging:false, chargeTimer:0, chargeDir:new THREE.Vector3(),
    phase2:false,    // triggers at 50% HP for final boss
    enraged:false,   // triggers at 25% HP
    attackCooldown:0,
  };
  roomEnemies++;
}

// ── BOSS AI with unique attack patterns per tier ──
const _bossDir = new THREE.Vector3();
const _toPlayer = new THREE.Vector3();

function updateBossAI(dt) {
  if(!boss||!boss.alive) return;
  const now = performance.now()/1000;
  const b = boss;

  // Phase transitions (final boss only)
  if(b.tier===5) {
    const pct = b.hp/b.maxHp;
    if(!b.phase2 && pct<=0.5) {
      b.phase2 = true;
      b.speed *= 1.5;
      // Flash the screen
      showBossPhaseChange('⚠ PHASE 2 ⚠', b.col);
      // Spawn minion burst
      spawnBossMinions(6);
    }
    if(!b.enraged && pct<=0.25) {
      b.enraged = true;
      b.speed *= 1.3;
      b.dmg *= 1.5;
      showBossPhaseChange('☠ ENRAGED ☠', 0xff0000);
    }
  }

  // Position / float
  _toPlayer.subVectors(camera.position, b.group.position); _toPlayer.y=0;
  const dist = _toPlayer.length();
  _toPlayer.normalize();

  // ── Charging attack (tiers 1+) ──
  if(b.charging) {
    b.chargeTimer -= dt;
    b.group.position.x += b.chargeDir.x * 18 * dt;
    b.group.position.z += b.chargeDir.z * 18 * dt;
    if(dist < 2.5+b.sc) { damagePlayer(b.dmg*1.5|0); b.charging=false; }
    if(b.chargeTimer<=0) b.charging=false;
    if(b.group.position.x<-arenaSize+2||b.group.position.x>arenaSize-2||b.group.position.z<-arenaSize+2||b.group.position.z>arenaSize-2) b.charging=false;
  } else {
    // Normal movement
    const spd = b.speed * dt * (b.enraged ? 1.4 : 1);
    b.group.position.x += _toPlayer.x * spd;
    b.group.position.z += _toPlayer.z * spd;
  }
  b.group.lookAt(camera.position.x, b.group.position.y, camera.position.z);
  b.group.position.y = b.sc*2.2 + Math.sin(now*1.4)*0.12;

  // ── Melee ──
  if(dist < 3.0+b.sc && now - b.lastShot > 0.7) {
    b.lastShot = now;
    damagePlayer(b.dmg + Math.floor(Math.random()*10));
  }

  // ── Ranged attacks (by tier) ──
  const atkCd = b.enraged ? 1.2 : b.phase2 ? 1.8 : 2.5;

  if(now - b.lastSpecial > atkCd && dist > 4) {
    b.lastSpecial = now;
    const origin = b.group.position.clone();
    origin.y += b.sc * 1.8;

    if(b.tier===1) {
      // Tier 1: Single slow homing shot
      spawnProjectile(origin, _toPlayer.clone(), 8, 18, b.col);

    } else if(b.tier===2) {
      // Tier 2: 3-shot spread
      for(let i=-1;i<=1;i++){
        const d=_toPlayer.clone();
        d.applyAxisAngle(new THREE.Vector3(0,1,0), i*0.35);
        spawnProjectile(origin.clone(), d, 11, 22, b.col);
      }

    } else if(b.tier===3) {
      // Tier 3: Burst of 5 fast shots
      for(let i=0;i<5;i++){
        setTimeout(()=>{
          if(!boss||!boss.alive) return;
          const o=boss.group.position.clone(); o.y+=boss.sc*1.8;
          const d=_toPlayer.clone().add(new THREE.Vector3((Math.random()-0.5)*0.4,0,(Math.random()-0.5)*0.4)).normalize();
          spawnProjectile(o,d,15,28,boss.col);
        }, i*160);
      }
      // Also initiate charge every 6s
      if(now - b.lastCharge > 6) {
        b.lastCharge = now;
        b.charging = true;
        b.chargeTimer = 0.6;
        b.chargeDir.copy(_toPlayer);
      }

    } else if(b.tier===4) {
      // Tier 4: Heavy barrage + arc shot
      for(let i=0;i<7;i++){
        setTimeout(()=>{
          if(!boss||!boss.alive) return;
          const o=boss.group.position.clone(); o.y+=boss.sc*1.8;
          const d=_toPlayer.clone().add(new THREE.Vector3((Math.random()-0.5)*0.5,(Math.random()-0.5)*0.2,(Math.random()-0.5)*0.5)).normalize();
          spawnProjectile(o,d,14,30,boss.col);
        }, i*120);
      }
      // Arc of 5 around the player
      for(let i=0;i<5;i++){
        setTimeout(()=>{
          if(!boss||!boss.alive) return;
          const o=boss.group.position.clone(); o.y+=boss.sc*1.8;
          const angle=(i/5)*Math.PI*2;
          const d=new THREE.Vector3(Math.cos(angle),0,Math.sin(angle));
          spawnProjectile(o,d,10,20,boss.col,true);
        }, i*200+300);
      }
      // Spawn minions every 15s
      if(now - b.lastSpawn > 15) { b.lastSpawn=now; spawnBossMinions(3); }

    } else if(b.tier===5) {
      // Tier 5 (THE VOID): Rotating ring + homing + vertical drop
      // Ring of 8 projectiles
      for(let i=0;i<8;i++){
        setTimeout(()=>{
          if(!boss||!boss.alive) return;
          const o=boss.group.position.clone(); o.y+=boss.sc*1.8;
          const angle=(i/8)*Math.PI*2 + now*0.5;
          const d=new THREE.Vector3(Math.cos(angle),0,Math.sin(angle));
          spawnProjectile(o,d,13,35,0xff2200,true);
        }, i*80);
      }
      // 3 homing arcs from different heights
      for(let h=0;h<3;h++){
        setTimeout(()=>{
          if(!boss||!boss.alive) return;
          const o=boss.group.position.clone(); o.y+=h*2;
          const d=_toPlayer.clone().add(new THREE.Vector3((Math.random()-0.5)*0.3,0,(Math.random()-0.5)*0.3)).normalize();
          spawnProjectile(o,d,16,40,0xaa00ff,h===1);
        }, h*250+400);
      }
      // Ground slam: drops big projectile from above player
      if(b.phase2) {
        setTimeout(()=>{
          if(!boss||!boss.alive) return;
          const o=new THREE.Vector3(camera.position.x,18,camera.position.z);
          spawnProjectile(o,new THREE.Vector3(0,-1,0),20,50,0xff0000,true);
        }, 1200);
      }
      // Spawn minions in phase 2
      if(b.phase2 && now - b.lastSpawn > 10) { b.lastSpawn=now; spawnBossMinions(4); }
    }
  }

  // Pulse cores
  b.cores.forEach((c,i)=>{
    c.rotation.y += dt*2.5; c.rotation.x += dt*1.5;
    const pulse = (b.enraged?4:b.phase2?3:2) + Math.sin(now*4+i)*0.8;
    c.material.emissiveIntensity = pulse;
  });
}

function spawnBossMinions(count) {
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      if(!boss||!boss.alive) return;
      const angle=Math.random()*Math.PI*2, dist=8+Math.random()*5;
      const x=boss.group.position.x+Math.cos(angle)*dist;
      const z=boss.group.position.z+Math.sin(angle)*dist;
      const type=['drone','speeder'][Math.floor(Math.random()*2)];
      spawnEnemy(type, x, z);
      updateRoomHUD();
    }, i*300);
  }
}

function showBossPhaseChange(text, col) {
  const el = document.getElementById('boss-announce');
  el.textContent = text;
  el.style.color = '#'+col.toString(16).padStart(6,'0');
  el.style.textShadow = `0 0 40px #${col.toString(16).padStart(6,'0')}`;
  el.style.opacity = '1';
  setTimeout(()=>el.style.opacity='0', 2500);
  // Screen shake
  doScreenShake(0.6);
}

// Screen shake
let shakeTimer=0, shakeIntensity=0;
function doScreenShake(duration, intensity=0.12){
  shakeTimer=duration; shakeIntensity=intensity;
}
function updateScreenShake(dt){
  if(shakeTimer<=0) return;
  shakeTimer-=dt;
  const i=shakeIntensity*(shakeTimer/0.6);
  camera.position.x+=(Math.random()-0.5)*i;
  camera.position.y+=(Math.random()-0.5)*i*0.5;
}

// ── Room system ──
let room=1, roomEnemies=0, roomKills=0, roomPhase='fighting';
let kills=0, score=0;
const BOSS_ROOMS=[10,20,30,40,50];
const MAX_ROOM=50;

function getEnemyCount(r){ return isBoss(r)?1:Math.min(30,4+Math.floor(r*0.65)); }
function isBoss(r){ return BOSS_ROOMS.includes(r); }

// Gradual enemy type introduction
function getTypes(r){
  if(r<=2)  return ['soldier'];
  if(r<=5)  return ['soldier','soldier','drone'];          // mostly soldiers + some drones
  if(r<=9)  return ['soldier','drone','speeder'];
  if(r<=15) return ['soldier','drone','speeder','speeder'];// speeder focus
  if(r<=24) return ['soldier','drone','speeder','heavy'];
  if(r<=34) return ['soldier','drone','speeder','heavy','heavy']; // heavy focus
  return            ['soldier','drone','speeder','heavy','drone']; // all types balanced
}

function spawnRoomEnemies(){
  roomEnemies=0; roomKills=0;
  if(isBoss(room)){
    spawnBoss(room);
  } else {
    const count=getEnemyCount(room), types=getTypes(room);
    for(let i=0;i<count;i++){
      const type=types[Math.floor(Math.random()*types.length)];
      const angle=Math.random()*Math.PI*2, dist=18+Math.random()*12;
      const ex=Math.cos(angle)*dist, ez=Math.sin(angle)*dist;
      // Clamp to arena
      spawnEnemy(type, Math.max(-arenaSize+3,Math.min(arenaSize-3,ex)), Math.max(-arenaSize+3,Math.min(arenaSize-3,ez)));
    }
  }
  updateRoomHUD();
}

function updateRoomHUD(){
  document.getElementById('room-value').textContent=room;
  const alive=enemies.filter(e=>e.alive).length+(boss&&boss.alive?1:0);
  document.getElementById('enemies-left').textContent=`ENEMIES: ${alive}`;
}

const burningEnemies=new Map();

let mouseLocked=false,shooting=false,adsHeld=false;
let lastShot=0;
let listeningFor=null;
let lastMX=0,lastMY=0;

// ── Input ──
document.addEventListener('keydown',e=>{
  if(listeningFor){
    settings.keys[listeningFor.dataset.action]=e.code;
    const lbl=e.code.replace('Key','').replace('Digit','').replace('ShiftLeft','LSHIFT').replace('ShiftRight','RSHIFT').replace('Space','SPACE').replace('Arrow','');
    listeningFor.textContent=lbl; listeningFor.classList.remove('listening'); listeningFor=null;
    e.preventDefault(); return;
  }
  keys[e.code]=true;
  if(e.code==='Escape'&&running&&!player.dead){
    if(document.getElementById('settings-panel').classList.contains('open'))
      document.getElementById('settings-panel').classList.remove('open');
    else togglePause();
  }
  if(e.code===settings.keys.reload&&!player.reloading&&player.ammo<player.magSize&&player.reserve>0&&!player.paused) startReload();
});
document.addEventListener('keyup',e=>{ keys[e.code]=false; });
document.addEventListener('mousemove',e=>{
  if(!mouseLocked) return;
  lastMX=e.movementX; lastMY=e.movementY;
  const s=player.ads?settings.adsSens:settings.sens;
  player.yaw-=e.movementX*s;
  player.pitch-=e.movementY*s*(settings.invertY?-1:1);
  player.pitch=Math.max(-Math.PI/2.1,Math.min(Math.PI/2.1,player.pitch));
});
document.addEventListener('mousedown',e=>{ if(e.button===0)shooting=true; if(e.button===2){adsHeld=true;e.preventDefault();} });
document.addEventListener('mouseup',e=>{ if(e.button===0)shooting=false; if(e.button===2)adsHeld=false; });
document.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('click',()=>{ if(!mouseLocked&&!player.dead&&!player.paused) canvas.requestPointerLock(); });
document.addEventListener('pointerlockchange',()=>{ mouseLocked=document.pointerLockElement===canvas; });

// ── Pause ──
function togglePause(){
  player.paused=!player.paused;
  if(player.paused){
    document.exitPointerLock();
    document.body.classList.add('show-cursor');
    document.getElementById('pause-screen').style.display='flex';
  } else {
    document.getElementById('pause-screen').style.display='none';
    document.body.classList.remove('show-cursor');
    canvas.requestPointerLock();
  }
}
document.getElementById('resumeBtn').onclick=()=>togglePause();
document.getElementById('pauseSettingsBtn').onclick=()=>document.getElementById('settings-panel').classList.add('open');
document.getElementById('pauseRestartBtn').onclick=()=>{ document.getElementById('pause-screen').style.display='none'; player.paused=false; document.body.classList.remove('show-cursor'); canvas.requestPointerLock(); initGame(); };
document.getElementById('exitBtn').onclick=()=>{ document.getElementById('pause-screen').style.display='none'; player.paused=false; running=false; document.body.classList.add('show-cursor'); document.getElementById('start-screen').style.display='flex'; };
document.getElementById('settingsBackBtn').onclick=()=>document.getElementById('settings-panel').classList.remove('open');
