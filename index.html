// ── Shooting ──
const raycaster=new THREE.Raycaster();

function tryShoot(dt){
  if(!mouseLocked||player.dead||player.reloading||player.paused) return;
  const now=performance.now()/1000;
  const fr=player.rapidFire?0.045:0.09;
  if(!shooting||now-lastShot<fr) return;
  if(player.ammo<=0){ startReload(); return; }
  lastShot=now; player.ammo--; updateHUD();
  muzzleLight.intensity=5; muzzleTimer=0.055;
  kickWeapon3D();

  raycaster.setFromCamera(new THREE.Vector2(0,0),camera);
  const meshes=[];
  enemies.filter(e=>e.alive).forEach(e=>e.group.traverse(c=>{ if(c.isMesh) meshes.push(c); }));
  if(boss&&boss.alive) boss.group.traverse(c=>{ if(c.isMesh) meshes.push(c); });

  const hits=raycaster.intersectObjects(meshes,false);

  // Spawn tracer regardless of hit
  const tracerEnd = hits.length > 0 ? hits[0].point :
    camera.position.clone().addScaledVector(
      new THREE.Vector3(-Math.sin(player.yaw)*Math.cos(player.pitch), Math.sin(player.pitch), -Math.cos(player.yaw)*Math.cos(player.pitch)),
      50
    );
  const tracerStart = camera.position.clone().addScaledVector(
    new THREE.Vector3(-Math.sin(player.yaw)*Math.cos(player.pitch), Math.sin(player.pitch), -Math.cos(player.yaw)*Math.cos(player.pitch)),
    0.5
  );
  spawnTracer(tracerStart, tracerEnd);

  if(!hits.length) return;

  // Piercing processes all hits; normal just first
  const toProcess=player.piercingBullets ? hits : [hits[0]];
  const hitIds=new Set();

  toProcess.forEach(hit=>{
    const hitObj=hit.object;

    // Regular enemy
    const en=enemies.find(e=>e.alive&&!hitIds.has(e)&&e.group.children.some(c=>c===hitObj));
    if(en){
      hitIds.add(en);
      const hs=hitObj._isHead;
      const dmg=hs?2:1;
      en.hp-=dmg; showHitMarker(hs); spawnBlood(hit.point);
      spawnDmgNumber(hit.point, dmg, hs);
      if(player.fireBullets&&!burningEnemies.has(en)) burningEnemies.set(en,{timer:3,dps:3+room*0.4});
      if(player.explosiveBullets) doSplash(hit.point,en,2.5,3);
      if(en.hp<=0){
        killEnemy(en);
        if(player.vampiric){ player.health=Math.min(player.health+5,player.maxHealth); updateHUD(); }
      }
      return;
    }

    // Boss
    if(boss&&boss.alive&&!hitIds.has(boss)&&boss.group.children.some(c=>c===hitObj)){
      hitIds.add(boss);
      const dmg=player.piercingBullets?2:1;
      boss.hp-=dmg; showHitMarker(false); spawnBlood(hit.point);
      spawnDmgNumber(hit.point, dmg, false);
      if(player.fireBullets&&!burningEnemies.has(boss)) burningEnemies.set(boss,{timer:3,dps:8});
      if(player.explosiveBullets) doSplash(hit.point,null,3.5,5);
      updateBossBar();
      if(boss.hp<=0){
        killBoss();
        if(player.vampiric){ player.health=Math.min(player.health+5,player.maxHealth); updateHUD(); }
      }
    }
  });
}

function doSplash(point,exclude,radius,dmg){
  enemies.forEach(en=>{
    if(!en.alive||en===exclude) return;
    if(point.distanceTo(en.group.position)<radius){ en.hp-=dmg; if(en.hp<=0) killEnemy(en); }
  });
  if(boss&&boss.alive&&point.distanceTo(boss.group.position)<radius+1){
    boss.hp-=dmg; updateBossBar(); if(boss.hp<=0) killBoss();
  }
  const fl=new THREE.PointLight(0xff6600,5,4); fl.position.copy(point); scene.add(fl);
  setTimeout(()=>scene.remove(fl),90);
}



function updateBossBar(){
  if(!boss) return;
  document.getElementById('boss-hpbar').style.width=Math.max(0,boss.hp/boss.maxHp*100)+'%';
}

// ── Enemy AI ──
const _v=new THREE.Vector3();
function updateEnemies(dt){
  if(player.paused) return;
  const now=performance.now()/1000;
  // Burn
  burningEnemies.forEach((data,en)=>{
    data.timer-=dt;
    if(data.timer<=0||!en.alive){ burningEnemies.delete(en); return; }
    en.hp-=data.dps*dt;
    if(en===boss) updateBossBar();
    if(en.hp<=0){ burningEnemies.delete(en); if(en===boss) killBoss(); else killEnemy(en); }
  });

  enemies.forEach(en=>{
    if(!en.alive) return;
    _v.subVectors(camera.position,en.group.position); _v.y=0;
    const dist=_v.length(); _v.normalize();
    const spd=en.speed*dt;
    const nx=en.group.position.x+_v.x*spd, nz=en.group.position.z+_v.z*spd;
    en.group.position.x=nx; en.group.position.z=nz;
    en.group.lookAt(camera.position.x,en.group.position.y,camera.position.z);

    if(en.type==='drone'){
      en.group.position.y=(en.floatBase||2.2)+Math.sin(now*2.5+en.group.position.x)*0.28;
      en.group.rotation.y+=dt*1.6;
    } else {
      const base=en.type==='heavy'?1.28:0.95;
      en.group.position.y=base+Math.sin(now*5+en.group.position.x)*0.04;
    }
    if(en.core){ en.core.rotation.y+=dt*3; en.core.rotation.x+=dt*1.5; en.core.material.emissiveIntensity=2.5+Math.sin(now*4)*1; }

    const mr=en.type==='heavy'?2.2:en.type==='speeder'?1.5:1.8;
    if(dist<mr&&now-en.lastShot>0.95){
      en.lastShot=now;
      const d=en.type==='heavy'?18:en.type==='speeder'?6:10;
      damagePlayer(d+Math.floor(Math.random()*(room*0.4+2)));
    }
  });

  // Boss AI — full attack patterns
  updateBossAI(dt);
}

function killEnemy(en){
  if(!en.alive) return;
  en.alive=false; scene.remove(en.group);
  kills++; roomKills++; score+=60+room*12; updateHUD(); showKillFlash(); updateRoomHUD();
  checkClear();
}
function killBoss(){
  if(!boss||!boss.alive) return;
  boss.alive=false; scene.remove(boss.group);
  kills++; roomKills++; score+=2500+room*200; updateHUD(); showKillFlash();
  document.getElementById('boss-hpbar-wrap').style.display='none';
  updateRoomHUD(); checkClear();
}
function checkClear(){
  if(enemies.filter(e=>e.alive).length===0&&(!boss||!boss.alive)&&roomPhase==='fighting'){
    roomPhase='door';
    // Room clear celebration
    const rcb = document.getElementById('room-clear-banner');
    rcb.textContent = isBoss(room) ? '⚡ BOSS DEFEATED ⚡' : '✓ ROOM CLEARED';
    rcb.style.color = isBoss(room) ? '#ffaa00' : '#00ff88';
    rcb.style.textShadow = isBoss(room) ? '0 0 24px #ffaa00' : '0 0 24px #00ff88';
    rcb.style.opacity='1';
    setTimeout(()=>rcb.style.opacity='0', 2000);

    if(room>=MAX_ROOM){
      setTimeout(showWinScreen, 800);
    } else {
      // Spawn the blue door portal after a short delay
      setTimeout(()=>{
        spawnDoorPortal();
        doScreenShake(0.3, 0.06);
      }, 600);
    }
  }
}

// ── Player movement ──
function updatePlayer(dt){
  if(player.dead||player.paused) return;
  const fwd=new THREE.Vector3(-Math.sin(player.yaw),0,-Math.cos(player.yaw));
  const rgt=new THREE.Vector3( Math.cos(player.yaw),0,-Math.sin(player.yaw));
  const sk=settings.keys;
  const isSpr=keys[sk.sprint], isCr=keys[sk.crouch];

  // Slide: sprint+crouch while moving on ground
  if(isSpr&&isCr&&player.onGround&&!player.sliding&&!player.crouching){
    const movingFwd=keys[sk.forward]||keys[sk.back]||keys[sk.left]||keys[sk.right];
    if(movingFwd){
      player.sliding=true; player.slideTimer=0;
      const ssp=22*(player.speedBoost?1.3:1);
      player.slideVelX=fwd.x*ssp; player.slideVelZ=fwd.z*ssp;
      player.crouching=true;
      document.getElementById('stance-indicator').textContent='SLIDING';
      document.getElementById('stance-indicator').style.opacity='1';
    }
  }

  if(!player.sliding){
    if(isCr&&player.onGround){
      player.crouching=true;
      document.getElementById('stance-indicator').textContent='CROUCHING';
      document.getElementById('stance-indicator').style.opacity='1';
    } else if(!isCr){
      player.crouching=false;
      document.getElementById('stance-indicator').style.opacity='0';
    }
  }

  let dx=0,dz=0;
  if(player.sliding){
    player.slideTimer+=dt;
    const dec=1-(player.slideTimer/player.slideDuration);
    if(dec<=0||!player.onGround){
      player.sliding=false; player.crouching=isCr;
      if(!isCr) document.getElementById('stance-indicator').style.opacity='0';
      else { document.getElementById('stance-indicator').textContent='CROUCHING'; }
    } else { dx=player.slideVelX*dec*dt; dz=player.slideVelZ*dec*dt; }
  } else {
    const spd=(isSpr&&!player.crouching?player.speed*player.sprintMult:player.crouching?player.speed*0.5:player.speed)*dt*(player.speedBoost?1.35:1);
    if(keys[sk.forward]){dx+=fwd.x*spd;dz+=fwd.z*spd;}
    if(keys[sk.back])   {dx-=fwd.x*spd;dz-=fwd.z*spd;}
    if(keys[sk.left])   {dx-=rgt.x*spd;dz-=rgt.z*spd;}
    if(keys[sk.right])  {dx+=rgt.x*spd;dz+=rgt.z*spd;}
  }

  if(!checkColl(camera.position.x+dx,camera.position.z)) camera.position.x+=dx;
  if(!checkColl(camera.position.x,camera.position.z+dz)) camera.position.z+=dz;

  // Jump - fixed: use dedicated jump key only
  if(keys[sk.jump]&&player.onGround&&!player.crouching&&!player.sliding){
    player.velY=5.5; player.onGround=false;
  }
  player.velY-=20*dt;
  camera.position.y+=player.velY*dt;
  const tH=player.crouching?1.0:1.7;
  camera.position.y+=(tH-camera.position.y)*Math.min(dt*11,1);
  if(camera.position.y<=tH){ camera.position.y=tH; player.velY=0; player.onGround=true; }

  // ADS
  player.adsProgress+=(( adsHeld?1:0)-player.adsProgress)*Math.min(dt*13,1);
  player.ads=player.adsProgress>0.5;
  camera.fov=settings.fov+(player.adsFov-settings.fov)*player.adsProgress;
  camera.updateProjectionMatrix();
  document.getElementById('ads-vignette').style.opacity=player.adsProgress*0.86;
  document.getElementById('crosshair').style.opacity=1-player.adsProgress*0.88;

  camera.rotation.order='YXZ';
  camera.rotation.y=player.yaw; camera.rotation.x=player.pitch;
  muzzleLight.position.copy(camera.position).addScaledVector(fwd,0.5);

  const moving=dx!==0||dz!==0;
  if(moving&&player.onGround) camera.position.y+=Math.sin(performance.now()*0.009)*0.021*(1-player.adsProgress);

  // Powerup timers
  if(player.fireTimer>0)  { player.fireTimer-=dt;   if(player.fireTimer<=0)   { player.fireBullets=false;      updateHUD(); }}
  if(player.speedTimer>0) { player.speedTimer-=dt;  if(player.speedTimer<=0)  { player.speedBoost=false; }}
  if(player.shieldTimer>0){ player.shieldTimer-=dt; if(player.shieldTimer<=0) { player.shield=false; }}
  if(player.rapidTimer>0) { player.rapidTimer-=dt;  if(player.rapidTimer<=0)  { player.rapidFire=false; }}
  if(player.pierceTimer>0){ player.pierceTimer-=dt; if(player.pierceTimer<=0) { player.piercingBullets=false; }}
  if(player.explodeTimer>0){player.explodeTimer-=dt;if(player.explodeTimer<=0){ player.explosiveBullets=false; }}
}

// ── Weight-based selection ──
function getChoices() {
  // Build pool respecting limits
  let pool = ALL_PU.filter(p => {
    if (p._healthLimited && player.healthPickupsUsed >= 5) return false;
    return true;
  });

  // Expand by weight for weighted random
  const weighted = [];
  pool.forEach(p => { for (let i = 0; i < (p.weight || 1); i++) weighted.push(p); });

  // Pick 3 unique IDs
  const chosen = [], seenIds = new Set();
  const shuffled = weighted.slice().sort(() => Math.random() - 0.5);
  for (const p of shuffled) {
    if (!seenIds.has(p.id)) { seenIds.add(p.id); chosen.push(p); }
    if (chosen.length === 3) break;
  }
  // Fallback if somehow fewer than 3
  while (chosen.length < 3 && pool.length > chosen.length) {
    const fallback = pool.find(p => !seenIds.has(p.id));
    if (!fallback) break;
    seenIds.add(fallback.id); chosen.push(fallback);
  }
  return chosen;
}

const RARITY_LABELS = { common:'COMMON', uncommon:'UNCOMMON', rare:'RARE', epic:'EPIC', legendary:'LEGENDARY ★' };

function buildBannerHTML(p) {

    <span class="pu-stripe"></span>
    <div class="pu-inner">
      <div class="pu-rarity">${RARITY_LABELS[p.rarity] || 'COMMON'}</div>
      <span class="pu-icon">${p.icon}</span>
      <div class="pu-name">${p.name}</div>
      <div class="pu-desc">${p.desc}</div>
      ${p.stat ? `<div class="pu-stat">${p.stat}</div>` : ''}
    </div>`;
}

function showPowerupScreen() {
  document.exitPointerLock();
  document.body.classList.add('show-cursor');

  const choices = getChoices();
  const ct = document.getElementById('powerup-banners');
  ct.innerHTML = '';

  // Health limit indicator
  const hlEl = document.getElementById('pu-health-limit');
  const remaining = 5 - player.healthPickupsUsed;
  hlEl.textContent = remaining > 0
    ? `HEALTH PACKS REMAINING: ${remaining} / 5`
    : `HEALTH PACKS EXHAUSTED`;
  hlEl.style.color = remaining > 0 ? 'rgba(0,255,136,0.5)' : 'rgba(255,80,80,0.5)';

  // Room badge
  document.getElementById('pu-room-badge').textContent = `ROOM ${room} CLEARED`;

  choices.forEach(p => {
    const d = document.createElement('div');
    d.className = `pu-banner ${p.rarity}`;
    d.innerHTML = buildBannerHTML(p);
    d.addEventListener('click', () => {
      // Chosen animation then apply
      d.classList.add('chosen');
      // Fade out siblings
      ct.querySelectorAll('.pu-banner:not(.chosen)').forEach(b => {
        b.style.transition = 'opacity 0.25s';
        b.style.opacity = '0.15';
        b.style.pointerEvents = 'none';
      });
      setTimeout(() => {
        p.apply();
        hidePowerupScreen();
      }, 340);
    });
    ct.appendChild(d);
  });

  document.getElementById('powerup-screen').classList.add('open');
}

function hidePowerupScreen(){
  document.getElementById('powerup-screen').classList.remove('open');
  document.body.classList.remove('show-cursor');
  canvas.requestPointerLock();
  enterNextRoom();
}

function enterNextRoom(){
  room++; roomPhase='fighting'; transitioning=false;
  enemies.forEach(e=>scene.remove(e.group)); enemies.length=0;
  projectiles.forEach(p=>{ scene.remove(p.mesh); scene.remove(p.pLight); }); projectiles.length=0;
  burningEnemies.clear(); boss=null;
  removeDoorPortal();

  // Arena sizes by room
  let sz;
  if(room===50)      sz=100;  // Final boss: massive arena
  else if(room>=40)  sz=65;
  else if(room>=30)  sz=55;
  else if(room>=20)  sz=48;
  else if(room>=10)  sz=42;
  else               sz=38;

  buildArena(sz);

  // Final boss: dramatic red fog
  if(room===50){
    scene.fog = new THREE.FogExp2(0x1a0005, 0.018);
    scene.background = new THREE.Color(0x0d0002);
  } else if(isBoss(room)){
    scene.fog = new THREE.FogExp2(0x080010, 0.022);
    scene.background = null;
  } else {
    scene.fog = new THREE.FogExp2(0x050810, 0.03);
    scene.background = null;
  }

  camera.position.set(0,1.7,0);

  // Boss room announcement
  if(isBoss(room)){
    const def = BOSS_DEFS[Math.min(4,Math.floor((room-1)/10))];
    const ba=document.getElementById('boss-announce');
    if(room===50){
      ba.innerHTML='☠ FINAL BOSS ☠<br><span style="font-size:0.45em;letter-spacing:3px;">THE VOID AWAKENS</span>';
    } else {
      ba.textContent=`⚠ ${def.name} ⚠`;
    }
    const hexCol='#'+def.col.toString(16).padStart(6,'0');
    ba.style.color=hexCol; ba.style.textShadow=`0 0 40px ${hexCol}`;
    ba.style.opacity='1';
    setTimeout(()=>ba.style.opacity='0',3000);
  }

  const ra=document.getElementById('room-announce');
  ra.innerHTML=`ROOM ${room}`+(room===50?`<br><span style="font-size:0.42em;color:#ff0000;letter-spacing:5px;">FINAL BOSS</span>`:isBoss(room)?`<br><span style="font-size:0.42em;color:var(--gold);letter-spacing:4px;">BOSS ENCOUNTER</span>`:'');
  ra.style.opacity='1';
  setTimeout(()=>{ ra.style.opacity='0'; setTimeout(()=>spawnRoomEnemies(),400); },2200);
  canvas.requestPointerLock();
}

function showWinScreen(){
  running=false; document.exitPointerLock(); document.body.classList.add('show-cursor');
  // Clear any remaining projectiles
  projectiles.forEach(p=>{ scene.remove(p.mesh); scene.remove(p.pLight); }); projectiles.length=0;
  document.getElementById('win-stats').innerHTML=
    `SCORE <span>${score.toLocaleString()}</span><br>KILLS <span>${kills}</span><br>ROOMS <span>50 / 50</span>`;
  document.getElementById('win-screen').style.display='flex';
}

// ── Damage ──
function damagePlayer(dmg){
  if(player.dead) return;
  if(player.shield) dmg=Math.ceil(dmg*0.5);
  player.health=Math.max(0,player.health-dmg); updateHUD(); showHitFlash();
  if(player.health<=0) gameOver();
}
function gameOver(){
  player.dead=true; document.exitPointerLock(); document.body.classList.add('show-cursor');
  document.getElementById('death-stats').innerHTML=`ROOM <span>${room}</span> &nbsp;|&nbsp; KILLS <span>${kills}</span> &nbsp;|&nbsp; SCORE <span>${score}</span>`;
  document.getElementById('death-screen').style.display='flex';
}

// ── Reload ──
function startReload(){
  if(player.reserve<=0||player.ammo===player.magSize) return;
  player.reloading=true; player.reloadTimer=0;
  document.getElementById('reload-text').style.opacity='1';
}
function finishReload(){
  const n=player.magSize-player.ammo, t=Math.min(n,player.reserve);

}

  if(player.speedBoost)       pill('speed',  `⚡ SPEED      ${Math.ceil(player.speedTimer)}s`);

const _proj = new THREE.Vector3();

// ── Bullet tracer system ──
const tracerMat = new THREE.MeshBasicMaterial({ color: 0xffee88, transparent: true, opacity: 0.7 });
const tracerFireMat = new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.8 });
const tracerPierceMat = new THREE.MeshBasicMaterial({ color: 0x88aaff, transparent: true, opacity: 0.8 });
const tracerExpMat = new THREE.MeshBasicMaterial({ color: 0xff3300, transparent: true, opacity: 0.9 });
const tracers = [];

function spawnTracer(from, to) {
  const dir = new THREE.Vector3().subVectors(to, from);
  const len = dir.length();
  if(len < 0.1) return;
  const mat = player.explosiveBullets ? tracerExpMat :
              player.piercingBullets  ? tracerPierceMat :
              player.fireBullets      ? tracerFireMat : tracerMat;
  const geo = new THREE.CylinderGeometry(0.012, 0.012, Math.min(len, 25), 4);
  const mesh = new THREE.Mesh(geo, mat.clone());
  // Position at midpoint, orient along direction
  mesh.position.copy(from).addScaledVector(dir.normalize(), Math.min(len*0.5, 12));
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
  scene.add(mesh);
  tracers.push({ mesh, life: 0.08 });
}

function updateTracers(dt) {
  for(let i=tracers.length-1;i>=0;i--){
    const t=tracers[i];
    t.life-=dt;
    t.mesh.material.opacity = Math.max(0, t.life / 0.08 * 0.7);
    if(t.life<=0){ scene.remove(t.mesh); t.mesh.geometry.dispose(); t.mesh.material.dispose(); tracers.splice(i,1); }
  }
}

const bloodPool=[];
function spawnBlood(pos){
  if(bloodPool.length>50) return;
  for(let i=0;i<4;i++){
    const col = player.fireBullets ? 0xff4400 : 0xff0022;
    const m=new THREE.Mesh(new THREE.SphereGeometry(0.03,4,4),new THREE.MeshBasicMaterial({color:col}));
    m.position.copy(pos); scene.add(m);
    bloodPool.push({mesh:m,vel:new THREE.Vector3((Math.random()-0.5)*3,Math.random()*2.5+0.5,(Math.random()-0.5)*3),life:0.32});
  }
}

// ── Minimap ──
const minimapCtx = document.getElementById('minimapCanvas').getContext('2d');
const MM_SIZE = 110;

function drawMinimap() {
  const ctx = minimapCtx;
  const sz = arenaSize;
  ctx.clearRect(0,0,MM_SIZE,MM_SIZE);

  // Background
  ctx.fillStyle = 'rgba(5,8,20,0.85)';
  ctx.fillRect(0,0,MM_SIZE,MM_SIZE);

  // World to minimap transform
  function wx(x){ return (x/sz*0.5+0.5)*MM_SIZE; }
  function wz(z){ return (z/sz*0.5+0.5)*MM_SIZE; }

  // Cover blocks (walls)
  ctx.fillStyle = 'rgba(30,50,80,0.7)';
  covers.forEach(c=>{
    const x1=wx(c.minX), z1=wz(c.minZ);
    const x2=wx(c.maxX), z2=wz(c.maxZ);
    ctx.fillRect(x1,z1,x2-x1,z2-z1);
  });

  // Arena border
  ctx.strokeStyle='rgba(0,255,231,0.2)';
  ctx.lineWidth=1;
  ctx.strokeRect(1,1,MM_SIZE-2,MM_SIZE-2);

  // Enemies
  enemies.filter(e=>e.alive).forEach(en=>{
    const ex=wx(en.group.position.x), ez=wz(en.group.position.z);
    const col = en.type==='heavy' ? '#00ff44' : en.type==='speeder' ? '#44aaff' : en.type==='drone' ? '#ff6600' : '#ff2244';
    ctx.beginPath(); ctx.arc(ex,ez,3,0,Math.PI*2);
    ctx.fillStyle=col; ctx.fill();
  });

  // Boss
  if(boss&&boss.alive){
    const bx=wx(boss.group.position.x), bz=wz(boss.group.position.z);
    ctx.beginPath(); ctx.arc(bx,bz,5,0,Math.PI*2);
    ctx.fillStyle='#ffaa00';
    ctx.shadowBlur=6; ctx.shadowColor='#ffaa00';
    ctx.fill(); ctx.shadowBlur=0;
  }

  // Player — facing arrow
  const px=wx(camera.position.x), pz=wz(camera.position.z);
  ctx.save();
  ctx.translate(px,pz);
  ctx.rotate(-player.yaw);
  ctx.beginPath();
  ctx.moveTo(0,-6); ctx.lineTo(4,4); ctx.lineTo(0,2); ctx.lineTo(-4,4); ctx.closePath();
  ctx.fillStyle='#00ffe7';
  ctx.shadowBlur=8; ctx.shadowColor='#00ffe7';
  ctx.fill(); ctx.shadowBlur=0;
  ctx.restore();
}

const hpCanvas = document.getElementById('enemy-hpbar-canvas');
const hpCtx = hpCanvas.getContext('2d');

const _hpProj = new THREE.Vector3();
function drawEnemyHPBars() {
  hpCtx.clearRect(0,0,hpCanvas.width,hpCanvas.height);
  const toCheck = [...enemies.filter(e=>e.alive)];
  if(boss&&boss.alive) toCheck.push(boss);

  toCheck.forEach(en=>{
    // Skip if at full health (no need to show bar)
    const maxHp = en===boss ? boss.maxHp : en.maxHp;
    const curHp = en===boss ? boss.hp : en.hp;
    if(curHp>=maxHp) return;

    _hpProj.copy(en.group.position);
    _hpProj.y += en===boss ? boss.sc*2.8+1.5 : (en.type==='drone'?1.2:en.type==='heavy'?2.2:1.6);
    _hpProj.project(camera);
    if(_hpProj.z>1||_hpProj.z<-1) return;

    const sx=(_hpProj.x*0.5+0.5)*hpCanvas.width;
    const sy=(-_hpProj.y*0.5+0.5)*hpCanvas.height;
    if(sx<0||sx>hpCanvas.width||sy<0||sy>hpCanvas.height) return;

    const pct=Math.max(0,curHp/maxHp);
    const bw = en===boss ? 120 : 50;
    const bh = en===boss ? 8 : 5;

    // Background
    hpCtx.fillStyle='rgba(0,0,0,0.55)';
    hpCtx.fillRect(sx-bw/2-1, sy-bh/2-1, bw+2, bh+2);

    // HP bar
    const col = pct>0.5 ? '#00ff44' : pct>0.25 ? '#ffaa00' : '#ff2244';
    hpCtx.fillStyle=col;
    hpCtx.fillRect(sx-bw/2, sy-bh/2, bw*pct, bh);

    // Boss label
    if(en===boss){
      hpCtx.fillStyle='rgba(255,170,0,0.8)';
      hpCtx.font='bold 9px Share Tech Mono';
      hpCtx.textAlign='center';
      hpCtx.fillText('BOSS',sx,sy-7);
    }
  });
}

function updateWeapon3D(dt){
  const mv=keys[settings.keys.forward]||keys[settings.keys.back]||keys[settings.keys.left]||keys[settings.keys.right];
  if(mv&&player.onGround) WA.bP+=dt*8;
  const f=1-player.adsProgress;
  const bX=Math.sin(WA.bP)*0.011*f, bY=Math.abs(Math.sin(WA.bP))*-0.009*f;
  WA.swX+=((-lastMX*0.0005*f)-WA.swX)*Math.min(dt*9,1);
  WA.swY+=((-lastMY*0.0003*f)-WA.swY)*Math.min(dt*9,1);
  lastMX*=0.65; lastMY*=0.65;
  if(kT>0) kT-=dt; else { WA.kY+=(0-WA.kY)*Math.min(dt*14,1); WA.kRX+=(0-WA.kRX)*Math.min(dt*14,1); }
  let rY=0,rZ=0;
  if(player.reloading){const t=player.reloadTimer/player.reloadTime;rY=Math.sin(t*Math.PI)*-0.11;rZ=Math.sin(t*Math.PI)*0.17;}
  const aX=-REST.x*player.adsProgress, aY=0.06*player.adsProgress, aZ=0.10*player.adsProgress;
  gunGroup.position.set(REST.x+bX+WA.swX+aX, REST.y+bY+WA.kY+rY+WA.swY+aY+(player.crouching?-0.04:0), REST.z-aZ);
  gunGroup.rotation.set(REST.rx+WA.kRX, REST.ry, REST.rz+rZ);
  wfL.intensity=player.fireBullets?(1.4+Math.sin(performance.now()*0.01)*0.5):0;
}

// ── Main loop ──
let lastTime=performance.now(), running=false;

function gameLoop(){
  if(!running) return;
  requestAnimationFrame(gameLoop);
  const now=performance.now(), dt=Math.min((now-lastTime)/1000,0.05); lastTime=now;

  if(!player.paused){
    updatePlayer(dt);
    tryShoot(dt);
    updateEnemies(dt);
    updateWeapon3D(dt);
    updateTracers(dt);
    updateProjectiles(dt);
    updateScreenShake(dt);
    updateDoorPortal(dt);
    updateRoomHUD();

    if(player.reloading){player.reloadTimer+=dt;if(player.reloadTimer>=player.reloadTime)finishReload();}
    if(muzzleTimer>0){muzzleTimer-=dt;if(muzzleTimer<=0)muzzleLight.intensity=0;}

    // Blood particles
    for(let i=bloodPool.length-1;i>=0;i--){
      const p=bloodPool[i]; p.life-=dt; p.vel.y-=15*dt;
      p.mesh.position.addScaledVector(p.vel,dt);
      if(p.life<=0){scene.remove(p.mesh);bloodPool.splice(i,1);}
    }

    // Regen
    if(!player.dead&&player.health<player.maxHealth) player.health=Math.min(player.maxHealth,player.health+1.5*dt);
    updateHUD();

    // Minimap + HP bars (every frame is fine, they're 2D canvas)
    drawMinimap();
    drawEnemyHPBars();
  }

  renderer.render(scene,camera);
  wRenderer.render(wScene,wCamera);
}

  enemies.forEach(e=>scene.remove(e.group)); enemies.length=0;
  bloodPool.forEach(p=>scene.remove(p.mesh)); bloodPool.length=0;
  tracers.forEach(t=>{ scene.remove(t.mesh); t.mesh.geometry.dispose(); }); tracers.length=0;
  projectiles.forEach(p=>{ scene.remove(p.mesh); scene.remove(p.pLight); }); projectiles.length=0;
  burningEnemies.clear();
  if(boss){scene.remove(boss.group);boss=null;}

  { name:'CYAN',    hex:'#00ffe7', three:0x00ffe7 },
  { name:'ORANGE',  hex:'#ff8800', three:0xff8800 },
  { name:'PURPLE',  hex:'#aa44ff', three:0xaa44ff },
  { name:'GREEN',   hex:'#00ff88', three:0x00ff88 },
  { name:'PINK',    hex:'#ff2288', three:0xff2288 },
  { name:'GOLD',    hex:'#ffcc00', three:0xffcc00 },
  { name:'RED',     hex:'#ff3333', three:0xff3333 },
];

// ── Local state ──
const lobby = {
  playerName: 'OPERATIVE',
  currentRoom: null,        // { id, name, host, isPrivate, code, limit, players[] }
  isHost: false,
  selectedRoomId: null,
  rooms: [],                // cached room list
};

// ── Simulated room database (replace with server state) ──
const SIMULATED_ROOMS = [
  { id:'r1', name:'VOID HUNTERS',   host:'SHADOW_X',    isPrivate:false, code:'VOID42', limit:4, players:[{name:'SHADOW_X',ping:22},{name:'REAPER',ping:48}],     ping:22  },
  { id:'r2', name:'BREACH SQUAD',   host:'N3ON_GHOST',  isPrivate:false, code:'BRCH99', limit:6, players:[{name:'N3ON_GHOST',ping:31},{name:'SPECTRAL',ping:55},{name:'VIPER',ping:88},{name:'BOLT',ping:120},{name:'KIRA',ping:44},{name:'ZED',ping:66}], ping:31  },
  { id:'r3', name:'PRIVATE GAME',   host:'CIPHER',      isPrivate:true,  code:'CIPH07', limit:2, players:[{name:'CIPHER',ping:14}],  ping:14  },
  { id:'r4', name:'SPEED RUN',      host:'QUICKBYTE',   isPrivate:false, code:'QKBT55', limit:7, players:[{name:'QUICKBYTE',ping:60},{name:'FLASHER',ping:90}],   ping:60  },
];

// ── NetBridge ─────────────────────────────────────────────
//  Replace these stub functions with real WebSocket calls.
//  Each function shows exactly what data to send/receive.
// ─────────────────────────────────────────────────────────
const NetBridge = {
  // Connect to signalling server
  // connect(serverUrl: string) → Promise<void>
  connect: async () => { /* ws = new WebSocket(serverUrl); */ },

  // Fetch public room list from server
  // getRooms() → Promise<Room[]>
  getRooms: async () => {
    // Real: await ws.send({type:'LIST_ROOMS'}); return ws.on('ROOM_LIST')
    await delay(400); // simulate latency
    return SIMULATED_ROOMS.map(r => ({...r, players:[...r.players]}));
  },

  // Create a room on the server
  // createRoom(config) → Promise<Room>
  createRoom: async (config) => {
    // Real: await ws.send({type:'CREATE_ROOM', ...config})
    await delay(300);
    const code = config.code || generateCode();
    return { id:'r'+(Date.now()%10000), ...config, code, players:[{name:lobby.playerName, ping:0}] };
  },

  // Join a room by ID or code
  // joinRoom(roomId|code) → Promise<Room|null>
  joinRoom: async (idOrCode) => {
    // Real: await ws.send({type:'JOIN_ROOM', idOrCode})
    await delay(350);
    const r = SIMULATED_ROOMS.find(r=>r.id===idOrCode||r.code===idOrCode.toUpperCase());
    if(!r) return null;
    if(r.players.length>=r.limit) return 'FULL';
    return {...r, players:[...r.players, {name:lobby.playerName, ping:0}]};
  },

  // Kick a player (host only)
  // kickPlayer(playerId) → Promise<void>
  kickPlayer: async (playerName) => {
    // Real: ws.send({type:'KICK', target:playerName})
    await delay(100);
  },

  // Send start signal to all players
  // startGame() → Promise<void>
  // All clients listen for {type:'START'} and call initGame()
  startGame: async () => {
    // Real: ws.send({type:'START_GAME'})
    // Each client receives: ws.on('START', ()=> startCountdown())
    await delay(100);
  },

  // Leave or delete a room
  leaveRoom: async () => { await delay(100); },

  // Send chat message
  sendChat: async (msg) => {
    // Real: ws.send({type:'CHAT', text:msg})
    await delay(50);
  },

  // ── How start-sync works (explanation) ──────────────────
  // 1. Host presses START → server validates all players ready
  // 2. Server broadcasts {type:'START', countdown:3} to all clients
  // 3. Every client receives it and calls startCountdown()
  // 4. After countdown: call initGame() simultaneously
  // 5. Use server timestamp to align start time exactly:
  //    setTimeout(initGame, serverStartTime - Date.now())
  // ─────────────────────────────────────────────────────────
};

// ── Utilities ──
function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }
function generateCode() {
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c=''; for(let i=0;i<6;i++) c+=chars[Math.floor(Math.random()*chars.length)];
  return c;
}
function showToast(msg, type='') {
  const t=document.getElementById('lobby-toast');
  t.textContent=msg; t.className='show '+(type?'toast-'+type:'');
  clearTimeout(t._tid); t._tid=setTimeout(()=>t.className='',2200);
}
// Safe confirm that works in sandboxed iframes where window.confirm is blocked
function showConfirm(msg) {
  return new Promise(resolve => {
    // Try native confirm first
    try {
      const r = window.confirm(msg);
      resolve(r); return;
    } catch(e) {}
    // Fallback: toast-style inline confirm
    showToast(msg + ' (Click LEAVE again to confirm)', 'error');
    // Simple double-click confirmation via a flag
    if(showConfirm._pending) { showConfirm._pending=false; resolve(true); }
    else { showConfirm._pending=true; setTimeout(()=>{ showConfirm._pending=false; }, 3000); resolve(false); }
  });
}

// ── LOBBY SCREEN LOGIC ──────────────────────────────────

function openLobby() {
  document.getElementById('start-screen').style.display='none';
  document.getElementById('lobby-screen').classList.add('open');
  document.body.classList.add('show-cursor');
  // Restore saved name (safe - localStorage may be blocked in sandboxed iframes)
  try {
    const saved = localStorage.getItem('vb_playername');
    if(saved) { lobby.playerName=saved; document.getElementById('lobby-player-name-input').value=saved; }
  } catch(e) {}
  refreshRoomList();
}

function closeLobby() {
  document.getElementById('lobby-screen').classList.remove('open');
  document.getElementById('start-screen').style.display='flex';
}

// Player name
document.getElementById('lobby-player-name-input').addEventListener('input', function(){
  const v = this.value.trim().toUpperCase().replace(/[^A-Z0-9_]/g,'');
  this.value=v; lobby.playerName=v||'OPERATIVE';
  try { localStorage.setItem('vb_playername', lobby.playerName); } catch(e) {}
});

// Refresh room list
async function refreshRoomList() {
  const listEl = document.getElementById('room-list');
  const countEl = document.getElementById('room-count');
  listEl.innerHTML='<div style="color:rgba(0,255,231,0.3);font-size:10px;letter-spacing:2px;padding:20px;text-align:center;">SCANNING...</div>';
  const rooms = await NetBridge.getRooms();
  lobby.rooms = rooms;
  listEl.innerHTML='';

  const pub = rooms.filter(r=>!r.isPrivate);
  countEl.textContent=`${pub.length} public room${pub.length!==1?'s':''} found`;

  if(pub.length===0){
    listEl.innerHTML='<div id="room-list-empty"><div style="font-size:28px;opacity:0.3">📡</div><div>NO ACTIVE ROOMS</div><div style="font-size:9px;color:rgba(255,255,255,0.15)">CREATE ONE OR REFRESH</div></div>';
  } else {
    pub.forEach(r=>{
      const full = r.players.length>=r.limit;
      const pingClass = r.ping<60?'ping-good':r.ping<120?'ping-ok':'ping-bad';
      const div=document.createElement('div');
      div.className='room-entry'+(full?' full':'')+(lobby.selectedRoomId===r.id?' selected':'');
      div.dataset.id=r.id;
      div.innerHTML=`
        <div class="room-entry-left">
          <div class="room-entry-name">${escHtml(r.name)}</div>
          <div class="room-entry-host">HOST: ${escHtml(r.host)}</div>
        </div>
        <div class="room-entry-right">
          <span class="room-entry-players">${r.players.length}/${r.limit}</span>
          <span class="${pingClass}">${r.ping}ms</span>
          ${full?'<span class="room-badge full-badge">FULL</span>':'<span class="room-badge pub">PUBLIC</span>'}
        </div>`;
      if(!full) div.addEventListener('click',()=>selectRoom(r.id));
      listEl.appendChild(div);
    });
  }
}

function selectRoom(id) {
  lobby.selectedRoomId=id;
  document.querySelectorAll('.room-entry').forEach(el=>{
    el.classList.toggle('selected', el.dataset.id===id);
  });
  document.getElementById('join-selected-btn').disabled=false;
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('refresh-btn').onclick = ()=>refreshRoomList();

// Join selected
document.getElementById('join-selected-btn').onclick = async ()=>{
  if(!lobby.selectedRoomId) return;
  await attemptJoin(lobby.selectedRoomId);
};

// Join by code
document.getElementById('join-code-btn').onclick = async ()=>{
  const code = document.getElementById('join-code-input').value.trim().toUpperCase();
  const errEl = document.getElementById('join-error');
  const inp = document.getElementById('join-code-input');

  if(!code){ errEl.textContent='Enter a room code.'; inp.classList.add('error'); setTimeout(()=>inp.classList.remove('error'),600); return; }
  if(code.length<4){ errEl.textContent='Code must be at least 4 characters.'; inp.classList.add('error'); setTimeout(()=>inp.classList.remove('error'),600); return; }

  errEl.textContent='';
  document.getElementById('join-code-btn').disabled=true;
  document.getElementById('join-code-btn').textContent='...';

  const result = await NetBridge.joinRoom(code);
  document.getElementById('join-code-btn').disabled=false;
  document.getElementById('join-code-btn').textContent='JOIN';

  if(!result){
    errEl.textContent='❌ Room not found. Check the code and try again.';
    inp.classList.add('error'); setTimeout(()=>inp.classList.remove('error'),600);
  } else if(result==='FULL'){
    errEl.textContent='❌ Room is full.';
    inp.classList.add('error'); setTimeout(()=>inp.classList.remove('error'),600);
  } else {
    errEl.textContent='';
    inp.classList.add('success');
    lobby.currentRoom=result; lobby.isHost=false;
    openStaging();
  }
};

async function attemptJoin(id) {
  const result = await NetBridge.joinRoom(id);
  if(!result||result==='FULL'){ showToast('Could not join room.','error'); return; }
  lobby.currentRoom=result; lobby.isHost=false;
  openStaging();
}

// Privacy toggle
let isPrivate=false;
document.getElementById('opt-public').onclick=()=>setPrivacy(false);
document.getElementById('opt-private').onclick=()=>setPrivacy(true);
function setPrivacy(priv){
  isPrivate=priv;
  document.getElementById('opt-public').classList.toggle('active',!priv);
  document.getElementById('opt-private').classList.toggle('active',priv);
  document.getElementById('custom-code-group').style.opacity=priv?'1':'0.3';
  document.getElementById('custom-code-group').style.pointerEvents=priv?'all':'none';
}

// Player limit slider
document.getElementById('player-limit-slider').oninput=function(){
  document.getElementById('player-limit-val').textContent=this.value;
};

// Generate code button
document.getElementById('gen-code-btn').onclick=()=>{
  document.getElementById('host-room-code').value=generateCode();
};

// Create room
document.getElementById('create-room-btn').onclick = async ()=>{
  const name = document.getElementById('host-room-name').value.trim();
  const limit = parseInt(document.getElementById('player-limit-slider').value);
  let code = document.getElementById('host-room-code').value.trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
  const nameInp = document.getElementById('host-room-name');

  if(!name){ nameInp.classList.add('error'); setTimeout(()=>nameInp.classList.remove('error'),600); showToast('Enter a room name.','error'); return; }

  // Validate private code
  if(isPrivate && code && code.length<4){
    showToast('Room code must be at least 4 characters.','error'); return;
  }
  if(!isPrivate) code='';

  document.getElementById('create-room-btn').textContent='CREATING...';
  document.getElementById('create-room-btn').disabled=true;

  const room = await NetBridge.createRoom({ name, isPrivate, code, limit, host:lobby.playerName });

  document.getElementById('create-room-btn').textContent='CREATE ROOM';
  document.getElementById('create-room-btn').disabled=false;

  lobby.currentRoom=room; lobby.isHost=true;
  openStaging();
};

// Back button
document.getElementById('lobby-back-btn').onclick = closeLobby;

// ── STAGING SCREEN LOGIC ─────────────────────────────────

function openStaging() {
  document.getElementById('lobby-screen').classList.remove('open');
  document.getElementById('staging-screen').classList.add('open');
  renderStagingHeader();
  renderPlayerList();
  updateStagingStatus();
  addSystemChat(`${lobby.playerName} joined the lobby.`);
  // Simulate other players joining over time (remove in real implementation)
  simulateLobbyActivity();
}

function renderStagingHeader() {
  const r = lobby.currentRoom;
  document.getElementById('staging-room-name').textContent=r.name;
  document.getElementById('staging-host-name').textContent=r.host||lobby.playerName;
  document.getElementById('staging-player-count').textContent=`${r.players.length}/${r.limit}`;
  const codeEl=document.getElementById('staging-code-display');
  codeEl.textContent = r.isPrivate||lobby.isHost ? `CODE: ${r.code}` : 'PUBLIC ROOM';
  const privBadge=document.getElementById('staging-privacy-badge');
  privBadge.innerHTML=r.isPrivate?'<span style="color:var(--gold)">🔒 PRIVATE</span>':'<span style="color:#00ff88">🌐 PUBLIC</span>';
  // Start btn only for host
  document.getElementById('start-game-btn').style.display=lobby.isHost?'block':'none';
}

function renderPlayerList() {
  const r=lobby.currentRoom;
  const listEl=document.getElementById('player-list');
  listEl.innerHTML='';
  r.players.forEach((p,i)=>{
    const col=PLAYER_COLORS[i%PLAYER_COLORS.length];
    const isMe=p.name===lobby.playerName;
    const isHost=p.name===r.host;
    const pingClass=!p.ping?'ping-good':p.ping<60?'ping-good':p.ping<120?'ping-ok':'ping-bad';
    const div=document.createElement('div');
    div.className='player-row';
    div.innerHTML=`
      <div class="player-color-dot" style="background:${col.hex};box-shadow:0 0 8px ${col.hex};"></div>
      <div class="player-row-name">${escHtml(p.name)}</div>
      ${isHost?'<span class="player-row-tag tag-host">HOST</span>':''}
      ${isMe&&!isHost?'<span class="player-row-tag tag-you">YOU</span>':''}
      <span class="${pingClass}">${p.ping||0}ms</span>
      ${lobby.isHost&&!isMe?`<button class="kick-btn" data-name="${escHtml(p.name)}">KICK</button>`:''}
    `;
    listEl.appendChild(div);
  });

  // Wire kick buttons
  listEl.querySelectorAll('.kick-btn').forEach(btn=>{
    btn.onclick=async ()=>{
      const name=btn.dataset.name;
      btn.textContent='...'; btn.disabled=true;
      await NetBridge.kickPlayer(name);
      lobby.currentRoom.players=lobby.currentRoom.players.filter(p=>p.name!==name);
      addSystemChat(`${name} was kicked by the host.`);
      renderPlayerList(); renderStagingHeader(); updateStagingStatus();
      showToast(`${name} kicked.`,'ok');
    };
  });

  document.getElementById('staging-player-count').textContent=`${r.players.length}/${r.limit}`;
  updateStagingStatus();
}

function updateStagingStatus() {
  const r=lobby.currentRoom;
  const cnt=r.players.length;
  const statusEl=document.getElementById('staging-status');
  const startBtn=document.getElementById('start-game-btn');
  const dot=statusEl.querySelector('.staging-status-dot')||document.createElement('span');
  const ready=cnt>=2;
  statusEl.innerHTML=`<span class="staging-status-dot ${ready?'dot-ready':'dot-waiting'}"></span>${ready?'READY TO START':'WAITING FOR PLAYERS...'}`;
  if(startBtn) startBtn.disabled=!ready||!lobby.isHost;
}

// Copy code on click
document.getElementById('staging-code-display').onclick=()=>{
  const code=lobby.currentRoom?.code;
  if(!code) return;
  navigator.clipboard?.writeText(code).catch(()=>{});
  const copied=document.getElementById('staging-code-copied');
  copied.style.opacity='1'; setTimeout(()=>copied.style.opacity='0',1500);
  showToast('Room code copied!','ok');
};

// Chat
document.getElementById('chat-send').onclick=sendChat;
document.getElementById('chat-input').addEventListener('keydown',e=>{ if(e.key==='Enter') sendChat(); });

function sendChat(){
  const inp=document.getElementById('chat-input');
  const msg=inp.value.trim(); if(!msg) return;
  inp.value='';
  addChatMsg(lobby.playerName, msg, PLAYER_COLORS[0].hex);
  NetBridge.sendChat(msg);
}

function addChatMsg(name, text, color='var(--neon)'){
  const el=document.createElement('div'); el.className='chat-msg';
  el.innerHTML=`<span class="chat-name" style="color:${color}">${escHtml(name)}</span>: ${escHtml(text)}`;
  const msgs=document.getElementById('chat-messages');
  msgs.appendChild(el); msgs.scrollTop=msgs.scrollHeight;
}
function addSystemChat(text){
  const el=document.createElement('div'); el.className='chat-msg system';
  el.textContent=`⚡ ${text}`;
  const msgs=document.getElementById('chat-messages');
  msgs.appendChild(el); msgs.scrollTop=msgs.scrollHeight;
}

// Start game button
document.getElementById('start-game-btn').onclick=async()=>{
  document.getElementById('start-game-btn').disabled=true;
  await NetBridge.startGame();
  // In real multiplayer: server broadcasts START to all, each client runs startCountdown()
  startCountdown();
};

function startCountdown(){
  const overlay=document.getElementById('countdown-overlay');
  const numEl=document.getElementById('countdown-num');
  overlay.classList.add('open');
  let n=3;
  numEl.textContent=n;
  const tick=setInterval(()=>{
    n--;
    if(n>0){ numEl.textContent=n; }
    else {
      clearInterval(tick);
      overlay.classList.remove('open');
      document.getElementById('staging-screen').classList.remove('open');
      document.body.classList.remove('show-cursor');
      // Assign player colors to the game world here:
      assignPlayerColor(lobby.currentRoom?.players||[], lobby.playerName);
      canvas.requestPointerLock();
      initGame();
    }
  },1000);
}

// Leave / delete room
document.getElementById('leave-room-btn').onclick=async()=>{
  if(lobby.isHost){
    // confirm() may be blocked in sandboxed iframes — use our own approach
    const really = await showConfirm('Delete room? All players will be disconnected.');
    if(!really) return;
  }
  await NetBridge.leaveRoom();
  document.getElementById('staging-screen').classList.remove('open');
  document.getElementById('chat-messages').innerHTML='<div class="chat-msg system">Welcome to the lobby.</div>';
  lobby.currentRoom=null; lobby.isHost=false;
  openLobby();
  showToast(lobby.isHost?'Room deleted.':'Left the room.');
};

// ── In-game player color assignment ──────────────────────
// Call this before initGame() to set each player's visual identity.
// In a real multiplayer game, sync colorIndex via the server.
function assignPlayerColor(players, myName){
  const myIdx = players.findIndex(p=>p.name===myName);
  const col = PLAYER_COLORS[Math.max(0,myIdx)%PLAYER_COLORS.length];
  // Apply to gun neon material (three.js side)
  if(window.NM) { // NM is the neonMat defined in weapon code
    NM.color.setHex(col.three);
    NM.emissive.setHex(col.three);
  }
  // Store for use
  lobby.myColor=col;
}

// ── Simulated lobby activity (REMOVE in real multiplayer) ──
// Simulates players joining/leaving so you can see the UI working.
let _simTimers=[];
function simulateLobbyActivity(){
  _simTimers.forEach(t=>clearTimeout(t)); _simTimers=[];
  if(!lobby.currentRoom) return;
  const names=['VIPER','GHOST_K','NEON_Y','STRYKER','BOLT_Z'];
  let delay2=1800;
  names.slice(0, Math.max(0, lobby.currentRoom.limit-1)).forEach((name,i)=>{
    _simTimers.push(setTimeout(()=>{
      if(!lobby.currentRoom||lobby.currentRoom.players.length>=lobby.currentRoom.limit) return;
      const ping=30+Math.floor(Math.random()*120);
      lobby.currentRoom.players.push({name, ping});
      addSystemChat(`${name} joined.`);
      addChatMsg(name, ['ready!','let\'s go','any strategy?','first time playing lol','GLHF'][i%5], PLAYER_COLORS[(i+1)%PLAYER_COLORS.length].hex);
      renderPlayerList(); renderStagingHeader(); updateStagingStatus();
    }, delay2+=1200+Math.random()*800));
  });
}

// ── Multiplayer entry point ──
document.getElementById('multiBtn').onclick=openLobby;
// startBtn stays solo
document.getElementById('startBtn').onclick=()=>{
  document.getElementById('start-screen').style.display='none';
  document.body.classList.remove('show-cursor');
  canvas.requestPointerLock(); initGame();
};
